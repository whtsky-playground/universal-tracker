<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>环球影城 · 年卡回本战绩票</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root{
  --paper:#f5f0e4;
  --paper2:#ede7d9;
  --ink:#1f2330;
  --ink2:#3a3d4a;
  --ink3:#6b6e7a;
  --ink4:#9b9da8;
  --green:#1a8a55;
  --green-bright:#22c06e;
  --green-bg:rgba(26,138,85,0.08);
  --red:#c44040;
  --red-bright:#e05555;
  --red-bg:rgba(196,64,64,0.08);
  --gold:#d4920a;
  --gold-bright:#f0a81c;
  --gold-bg:rgba(212,146,10,0.08);
  --blue:#3a7bd5;
  --blue-bright:#4cc1ff;
  --stamp-red:#c0392b;
  --stamp-green:#1a8a55;
  --stamp-gold:#c87f0a;
  --radius:12px;
  --font-num:'Bebas Neue','Noto Sans SC',sans-serif;
  --font-mono:'IBM Plex Mono','Noto Sans SC',monospace;
  --font-body:'Noto Sans SC',-apple-system,system-ui,sans-serif;
}

html{scroll-behavior:smooth}
body{
  font-family:var(--font-body);
  background:var(--paper);color:var(--ink);
  min-height:100vh;min-height:100dvh;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

/* === PAPER TEXTURE === */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.35;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;
}

/* === ANTI-COUNTERFEIT LINES (subtle) === */
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.018;
  background:repeating-linear-gradient(
    45deg,
    transparent,transparent 8px,
    var(--ink) 8px,var(--ink) 8.5px
  );
}

/* === LAYOUT === */
.container{
  max-width:460px;margin:0 auto;padding:16px 12px 80px;
  position:relative;z-index:2;
}

/* === TICKET MAIN (hero ticket) === */
.ticket{
  position:relative;
  background:#fffdf7;
  border:1.5px solid rgba(0,0,0,.08);
  border-radius:20px;
  margin-bottom:20px;
  box-shadow:0 1px 3px rgba(0,0,0,.04),0 8px 32px rgba(0,0,0,.06);
  overflow:visible;
}

/* Perforated edge circles */
.ticket::before,.ticket::after{
  content:'';position:absolute;
  width:26px;height:26px;border-radius:50%;
  background:var(--paper);
  border:1.5px solid rgba(0,0,0,.08);
  top:50%;transform:translateY(-50%);z-index:3;
}
.ticket::before{left:-14px}
.ticket::after{right:-14px}

/* Perforation line across middle */
.ticket-perf{
  position:relative;
  margin:0 14px;
  border:none;
  border-top:2px dashed rgba(0,0,0,.1);
}

/* === TICKET TOP === */
.ticket-top{
  padding:24px 22px 16px;
  text-align:center;
  position:relative;
}

.ticket-brand{
  font-family:var(--font-mono);
  font-size:10px;font-weight:600;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--ink3);margin-bottom:2px;
}
.ticket-title{
  font-size:18px;font-weight:900;
  letter-spacing:1px;
  color:var(--ink);
  margin-bottom:4px;
}
.ticket-meta{
  font-family:var(--font-mono);
  font-size:10px;color:var(--ink4);
  letter-spacing:.5px;
}

/* === TICKET BOTTOM (hero data) === */
.ticket-bottom{
  padding:16px 22px 24px;
  position:relative;
  text-align:center;
}

/* === GIANT PERCENTAGE === */
.hero-pct{
  font-family:var(--font-num);
  font-size:96px;letter-spacing:-1px;line-height:.9;
  color:var(--ink);
  margin-bottom:2px;
  position:relative;
  display:inline-block;
}
.hero-pct-suffix{
  font-family:var(--font-num);
  font-size:36px;
  vertical-align:super;
  opacity:.5;
}
.hero-label{
  font-size:11px;color:var(--ink4);
  font-weight:500;letter-spacing:1px;
  margin-bottom:16px;
}

/* === STAMP SYSTEM === */
.stamp{
  display:inline-block;
  padding:6px 20px;
  border:3px solid var(--stamp-red);
  border-radius:6px;
  font-family:var(--font-num);
  font-size:18px;letter-spacing:3px;
  color:var(--stamp-red);
  transform:rotate(-4deg);
  position:relative;
  margin-bottom:16px;
  opacity:.85;
  text-transform:uppercase;
}
.stamp::before{
  content:'';position:absolute;inset:-2px;
  border:1px solid var(--stamp-red);
  border-radius:8px;opacity:.4;
}
/* Stamp noise overlay */
.stamp::after{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 128 128' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.5' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:64px;
  mix-blend-mode:screen;opacity:.35;
  border-radius:4px;
}
.stamp.green{border-color:var(--stamp-green);color:var(--stamp-green)}
.stamp.green::before{border-color:var(--stamp-green)}
.stamp.gold{border-color:var(--stamp-gold);color:var(--stamp-gold)}
.stamp.gold::before{border-color:var(--stamp-gold)}

/* === NET VALUE BADGE === */
.net-row{
  display:flex;align-items:center;justify-content:center;
  gap:8px;margin-bottom:14px;flex-wrap:wrap;
}
.net-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:6px 14px;border-radius:100px;
  font-family:var(--font-mono);
  font-size:16px;font-weight:600;
}
.net-badge.pos{background:var(--green-bg);color:var(--green)}
.net-badge.neg{background:var(--red-bg);color:var(--red)}
.remain-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:6px 14px;border-radius:100px;
  font-family:var(--font-mono);
  font-size:13px;font-weight:500;
  background:rgba(0,0,0,.03);color:var(--ink3);
}

/* === PROGRESS BAR (ticket-style) === */
.progress-track{
  margin:0 0 14px;padding:0 2px;
}
.progress-bar{
  height:6px;border-radius:3px;
  background:rgba(0,0,0,.06);
  position:relative;overflow:hidden;
}
.progress-fill{
  height:100%;border-radius:3px;
  background:linear-gradient(90deg,var(--green),var(--green-bright));
  transition:width 1.8s cubic-bezier(.16,1,.3,1);
  width:0%;
}
.progress-fill.warn{background:linear-gradient(90deg,var(--gold),var(--gold-bright))}
.progress-labels{
  display:flex;justify-content:space-between;margin-top:6px;
  font-family:var(--font-mono);font-size:9px;color:var(--ink4);
}

/* === STATS ROW === */
.stat-row{
  display:flex;gap:6px;
}
.stat-pill{
  flex:1;padding:10px 8px;text-align:center;
  background:rgba(0,0,0,.02);
  border:1px solid rgba(0,0,0,.05);
  border-radius:8px;
}
.stat-val{
  font-family:var(--font-mono);
  font-size:16px;font-weight:600;letter-spacing:-.5px;
  margin-bottom:1px;
}
.stat-val.g{color:var(--green)}
.stat-val.r{color:var(--red)}
.stat-val.a{color:var(--blue)}
.stat-lbl{font-size:9px;color:var(--ink4);font-weight:500;letter-spacing:.5px}

/* === TICKET FOOTER LINE === */
.ticket-footer{
  padding:10px 22px 14px;text-align:center;
  border-top:1px solid rgba(0,0,0,.05);
}
.ticket-footer-text{
  font-family:var(--font-mono);
  font-size:9px;color:var(--ink4);letter-spacing:.5px;
}

/* === SECTION CARDS === */
.section{
  background:#fffdf7;
  border:1px solid rgba(0,0,0,.06);
  border-radius:var(--radius);
  margin-bottom:14px;
  overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.03);
}
.section-head{
  padding:14px 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(0,0,0,.04);
}
.section-title{
  font-size:12px;font-weight:700;color:var(--ink2);
  letter-spacing:.5px;
}
.section-badge{
  font-family:var(--font-mono);
  font-size:9px;font-weight:600;padding:3px 8px;
  border-radius:100px;background:rgba(0,0,0,.04);color:var(--ink3);
}
.section-body{padding:0 16px 16px}

/* === PREDICTION CARD === */
.predict-card{
  background:#fffdf7;
  border:1px solid rgba(0,0,0,.06);
  border-radius:var(--radius);
  margin-bottom:14px;
  padding:14px 16px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 1px 3px rgba(0,0,0,.03);
}
.predict-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.predict-text{font-size:12px;font-weight:600;color:var(--ink2);line-height:1.6}
.predict-text strong{
  font-family:var(--font-mono);
  color:var(--ink);font-weight:700;
}

/* === TREND CHART — break-even track === */
.chart-wrap{position:relative;width:100%;height:200px;margin:8px 0}
#trendCanvas{width:100%;height:100%;display:block}
.chart-tooltip{
  position:absolute;padding:5px 10px;
  background:#fffdf7;border:1px solid rgba(0,0,0,.1);
  border-radius:6px;font-size:10px;font-weight:600;
  font-family:var(--font-mono);
  pointer-events:none;opacity:0;transition:opacity .2s;
  white-space:nowrap;z-index:10;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  color:var(--ink);
}
.chart-legend{display:flex;gap:14px;justify-content:center;margin-top:4px}
.chart-legend span{font-size:9px;color:var(--ink4);display:flex;align-items:center;gap:4px}
.chart-legend i{display:inline-block;width:10px;height:3px;border-radius:2px}

/* === VISIT ITEMS === */
.visit-item{
  padding:12px 0;border-bottom:1px solid rgba(0,0,0,.04);
}
.visit-item:last-child{border-bottom:none}
.visit-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.visit-idx{
  font-family:var(--font-mono);
  font-size:9px;color:var(--ink4);
  background:rgba(0,0,0,.03);
  padding:2px 6px;border-radius:4px;
  margin-right:6px;
}
.visit-date{font-size:11px;font-weight:600;color:var(--ink2)}
.visit-net{
  font-family:var(--font-mono);
  font-size:13px;font-weight:700;
}
.visit-net.pos{color:var(--green)}.visit-net.neg{color:var(--red)}
.visit-bar-track{
  height:22px;border-radius:5px;display:flex;gap:2px;
  overflow:hidden;background:rgba(0,0,0,.04);
}
.visit-bar-seg{
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;font-family:var(--font-mono);
  color:#fff;border-radius:4px;min-width:26px;
  transition:flex-grow 1s cubic-bezier(.16,1,.3,1);
}
.visit-bar-seg.sv{background:var(--green)}
.visit-bar-seg.sp{background:var(--red)}
/* Highlight best/worst visit */
.visit-item.best{background:var(--green-bg);margin:0 -16px;padding:12px 16px;border-radius:8px}
.visit-item.worst{background:var(--red-bg);margin:0 -16px;padding:12px 16px;border-radius:8px}
.visit-tag{
  font-family:var(--font-mono);font-size:8px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  padding:2px 6px;border-radius:3px;margin-left:6px;
}
.visit-tag.best{background:var(--green);color:#fff}
.visit-tag.worst{background:var(--red);color:#fff}

/* === SPENDING BREAKDOWN === */
.breakdown-item{
  display:flex;align-items:center;gap:10px;
  padding:7px 0;
}
.breakdown-icon{font-size:15px;width:22px;text-align:center;flex-shrink:0}
.breakdown-info{flex:1;min-width:0}
.breakdown-name{font-size:11px;font-weight:500;margin-bottom:3px;color:var(--ink2)}
.breakdown-bar{height:4px;border-radius:2px;background:rgba(0,0,0,.05);overflow:hidden}
.breakdown-bar-fill{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(.16,1,.3,1)}
.breakdown-val{
  font-family:var(--font-mono);
  font-size:11px;font-weight:600;flex-shrink:0;width:52px;text-align:right;
}

/* === DETAIL ROWS === */
.detail-group{margin-bottom:10px}
.detail-group:last-child{margin-bottom:0}
.detail-date{
  font-family:var(--font-mono);
  font-size:10px;font-weight:600;color:var(--ink3);
  padding:5px 0;display:flex;align-items:center;gap:6px;
  border-bottom:1px solid rgba(0,0,0,.05);margin-bottom:3px;
}
.detail-date-dot{width:4px;height:4px;border-radius:50%;background:var(--green);flex-shrink:0}
.detail-date-net{
  margin-left:auto;
  font-family:var(--font-mono);
  font-weight:700;font-size:10px;
}
.detail-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:5px 0 5px 10px;
}
.detail-left{display:flex;align-items:center;gap:6px;min-width:0}
.detail-icon{font-size:12px;width:18px;text-align:center;flex-shrink:0}
.detail-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink2)}
.detail-val{
  font-family:var(--font-mono);
  font-size:11px;font-weight:600;flex-shrink:0;
}
.detail-val.pos{color:var(--green)}.detail-val.neg{color:var(--red)}.detail-val.z{color:var(--ink4)}

/* Collapsible details */
.detail-toggle{
  display:flex;align-items:center;justify-content:center;
  padding:10px;cursor:pointer;gap:4px;
  font-size:11px;color:var(--ink4);font-weight:500;
  border-top:1px solid rgba(0,0,0,.04);
  transition:color .2s;
}
.detail-toggle:hover{color:var(--ink2)}
.detail-toggle svg{transition:transform .3s}
.detail-toggle.open svg{transform:rotate(180deg)}
.detail-hidden{display:none}
.detail-hidden.show{display:block}

/* === FOOTER === */
.footer{
  text-align:center;padding:24px 0 12px;
  font-family:var(--font-mono);
  font-size:9px;color:var(--ink4);opacity:.5;
  letter-spacing:.5px;
}

/* === CONFETTI === */
.confetti-box{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden}
.cft{
  position:absolute;top:-16px;
  animation:cfall 3s cubic-bezier(.25,.46,.45,.94) forwards;
}
@keyframes cfall{
  0%{transform:translateY(0) rotate(0) scale(1);opacity:1}
  70%{opacity:1}
  100%{transform:translateY(105vh) rotate(720deg) scale(.3);opacity:0}
}

/* === LOADING === */
.loading{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:60vh;gap:12px;
}
.loading-ring{
  width:32px;height:32px;border:2.5px solid rgba(0,0,0,.08);
  border-top-color:var(--ink2);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:12px;color:var(--ink4);font-family:var(--font-mono)}

/* Scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:2px}

/* Tap highlight */
*{-webkit-tap-highlight-color:transparent}

/* === REDUCED MOTION === */
@media (prefers-reduced-motion:reduce){
  *{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
}

/* === DESKTOP TWEAK === */
@media (min-width:520px){
  .container{padding:32px 16px 80px}
  .ticket{border-radius:24px}
  .hero-pct{font-size:112px}
}
</style>
</head>
<body>

<div class="container" id="app">
  <div class="loading">
    <div class="loading-ring"></div>
    <div class="loading-text">LOADING</div>
  </div>
</div>

<script>
// ============================================
// APP CONFIG
// ============================================
const COST=1688,NAME='悠享年卡';
const ICONS={'🎢 入园':'🎢','🍔 餐饮':'🍔','🎁 商品折扣':'🎁','🅿️ 停车':'🅿️','🎪 活动/福利':'🎪','🏨 酒店折扣':'🏨'};
const CAT_COLORS={
  '🎢 入园':'var(--green)','🍔 餐饮':'#d97706','🎁 商品折扣':'#c2185b',
  '🅿️ 停车':'var(--blue)','🎪 活动/福利':'#7c3aed','🏨 酒店折扣':'#0891b2'
};

function fmtDate(d){
  const dt=new Date(d+'T00:00:00');
  const w=['日','一','二','三','四','五','六'];
  return`${dt.getMonth()+1}月${dt.getDate()}日 周${w[dt.getDay()]}`;
}

function fmtMoney(v){return v>=0?'+¥'+v:'-¥'+Math.abs(v)}

function countUp(el,target,prefix='',suffix='',duration=1200){
  const start=performance.now();
  const isFloat=suffix==='%';
  (function step(now){
    const p=Math.min((now-start)/duration,1);
    const ease=1-Math.pow(1-p,4);
    const val=ease*target;
    el.textContent=prefix+(isFloat?val.toFixed(1):Math.round(val))+suffix;
    if(p<1)requestAnimationFrame(step);
  })(start);
}

function confetti(){
  const box=document.createElement('div');box.className='confetti-box';
  const cols=['#1a8a55','#22c06e','#d4920a','#f0a81c','#c44040','#3a7bd5','#7c3aed','#e05555'];
  for(let i=0;i<80;i++){
    const c=document.createElement('div');c.className='cft';
    const size=4+Math.random()*8;
    const isCircle=Math.random()>.5;
    c.style.cssText=`
      left:${Math.random()*100}%;
      width:${size}px;height:${isCircle?size:size*2.5}px;
      background:${cols[~~(Math.random()*cols.length)]};
      border-radius:${isCircle?'50%':'2px'};
      animation-delay:${Math.random()*1.8}s;
      animation-duration:${2+Math.random()*1.5}s;
    `;
    box.appendChild(c);
  }
  document.body.appendChild(box);
  setTimeout(()=>box.remove(),5000);
}

// ============================================
// TREND CHART (break-even track)
// ============================================
function drawTrendChart(canvas,visits,done){
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  const W=rect.width,H=rect.height;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  const pad={t:22,r:12,b:28,l:40};
  const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;

  const maxVal=Math.max(COST*1.15,...visits.map(v=>v.cumNet))*1.05;
  const x=i=>pad.l+(visits.length===1?cW/2:i/(visits.length-1)*cW);
  const y=v=>pad.t+cH-(v/maxVal)*cH;

  // Grid lines (subtle)
  ctx.strokeStyle='rgba(0,0,0,0.04)';ctx.lineWidth=1;
  const gridSteps=4;
  for(let i=0;i<=gridSteps;i++){
    const gy=pad.t+(cH/gridSteps)*i;
    ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(W-pad.r,gy);ctx.stroke();
  }

  // Goal line (dashed)
  const goalY=y(COST);
  ctx.save();
  ctx.setLineDash([5,4]);
  ctx.strokeStyle='rgba(0,0,0,0.12)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad.l,goalY);ctx.lineTo(W-pad.r,goalY);ctx.stroke();
  ctx.restore();
  ctx.font="600 9px 'IBM Plex Mono','Noto Sans SC',monospace";
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.textAlign='end';
  ctx.fillText('¥'+COST+' GOAL',W-pad.r,goalY-5);

  // Y labels
  ctx.textAlign='end';ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.font="500 9px 'IBM Plex Mono','Noto Sans SC',monospace";
  for(let i=0;i<=gridSteps;i++){
    const val=Math.round(maxVal*(1-i/gridSteps));
    const gy=pad.t+(cH/gridSteps)*i;
    ctx.fillText('¥'+val,pad.l-6,gy+3);
  }

  // X labels
  ctx.textAlign='center';
  visits.forEach((v,i)=>{
    const dt=new Date(v.date+'T00:00:00');
    ctx.fillText((dt.getMonth()+1)+'/'+dt.getDate(),x(i),H-6);
  });

  if(visits.length<2)return;

  // Area fill
  const pts=visits.map((v,i)=>({x:x(i),y:y(v.cumNet)}));

  // Cardinal spline
  function getCardinalPoints(pts,tension=0.3){
    const cp=[];
    for(let i=0;i<pts.length;i++){
      const p0=pts[Math.max(0,i-1)];
      const p1=pts[i];
      const p2=pts[Math.min(pts.length-1,i+1)];
      const p3=pts[Math.min(pts.length-1,i+2)];
      cp.push({
        cp1x:p1.x+(p2.x-p0.x)*tension/3,
        cp1y:p1.y+(p2.y-p0.y)*tension/3,
        cp2x:p2.x-(p3.x-p1.x)*tension/3,
        cp2y:p2.y-(p3.y-p1.y)*tension/3,
        x:p2.x,y:p2.y
      });
    }
    return cp;
  }

  const cp=getCardinalPoints(pts);

  // Area gradient
  const areaGrad=ctx.createLinearGradient(0,pad.t,0,pad.t+cH);
  areaGrad.addColorStop(0,done?'rgba(26,138,85,0.15)':'rgba(58,123,213,0.12)');
  areaGrad.addColorStop(1,'rgba(255,255,255,0)');

  ctx.beginPath();
  ctx.moveTo(pts[0].x,y(0));
  ctx.lineTo(pts[0].x,pts[0].y);
  for(let i=0;i<cp.length-1;i++){
    ctx.bezierCurveTo(cp[i].cp1x,cp[i].cp1y,cp[i].cp2x,cp[i].cp2y,cp[i].x,cp[i].y);
  }
  ctx.lineTo(pts[pts.length-1].x,y(0));
  ctx.closePath();
  ctx.fillStyle=areaGrad;ctx.fill();

  // Line
  const lineColor=done?'#1a8a55':'#3a7bd5';
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=0;i<cp.length-1;i++){
    ctx.bezierCurveTo(cp[i].cp1x,cp[i].cp1y,cp[i].cp2x,cp[i].cp2y,cp[i].x,cp[i].y);
  }
  ctx.strokeStyle=lineColor;
  ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.stroke();

  // Milestone dots
  pts.forEach((p,i)=>{
    const isGoalCrossing=i>0&&visits[i].cumNet>=COST&&visits[i-1].cumNet<COST;
    const dotR=isGoalCrossing?6:3.5;
    ctx.beginPath();ctx.arc(p.x,p.y,dotR,0,Math.PI*2);
    ctx.fillStyle=isGoalCrossing?'var(--gold-bright)':lineColor;ctx.fill();
    ctx.beginPath();ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
    ctx.fillStyle='#fffdf7';ctx.fill();
    if(isGoalCrossing){
      ctx.font="bold 8px 'IBM Plex Mono',monospace";
      ctx.fillStyle='var(--gold)';ctx.textAlign='center';
      ctx.fillText('BREAK EVEN!',p.x,p.y-10);
    }
  });

  // Projection if not done
  if(!done&&visits.length>=2){
    const lastPt=pts[pts.length-1];
    const avgPerVisit=visits[visits.length-1].cumNet/visits.length;
    if(avgPerVisit>0){
      const projEndX=Math.min(W-pad.r,lastPt.x+(W-pad.r-lastPt.x)*0.5);
      const projEndY=y(Math.min(COST,maxVal*0.95));
      ctx.save();
      ctx.setLineDash([3,3]);
      ctx.strokeStyle='rgba(58,123,213,0.3)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(lastPt.x,lastPt.y);ctx.lineTo(projEndX,projEndY);ctx.stroke();
      ctx.restore();
    }
  }

  // Interactive tooltip
  const tooltip=canvas.parentElement.querySelector('.chart-tooltip');
  function handleHover(mx){
    let closest=-1,minD=Infinity;
    pts.forEach((p,i)=>{const d=Math.abs(p.x-mx);if(d<minD){minD=d;closest=i}});
    if(closest>=0&&minD<40){
      const v=visits[closest];
      const dt=new Date(v.date+'T00:00:00');
      tooltip.innerHTML=`${dt.getMonth()+1}/${dt.getDate()} · <span style="color:${v.cumNet>=COST?'var(--green)':'var(--blue)'}">¥${v.cumNet}</span>`;
      tooltip.style.opacity='1';
      tooltip.style.left=Math.min(Math.max(pts[closest].x-40,0),W-100)+'px';
      tooltip.style.top=(pts[closest].y-32)+'px';
    }else{
      tooltip.style.opacity='0';
    }
  }
  canvas.addEventListener('mousemove',e=>{
    const br=canvas.getBoundingClientRect();handleHover(e.clientX-br.left);
  });
  canvas.addEventListener('mouseleave',()=>{tooltip.style.opacity='0'});
  canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    const br=canvas.getBoundingClientRect();handleHover(e.touches[0].clientX-br.left);
  },{passive:false});
  canvas.addEventListener('touchend',()=>{tooltip.style.opacity='0'});
}

// ============================================
// RENDER
// ============================================
function render(records){
  const entrySaved=records.filter(r=>r.type==='🎢 入园').reduce((s,r)=>s+r.saved,0);
  const parkSpend=records.filter(r=>r.type!=='🎢 入园').reduce((s,r)=>s+r.paid,0);
  const net=entrySaved-parkSpend;
  const pct=Math.min(Math.max(net/COST*100,0),999);
  const done=net>=COST;
  const remaining=Math.max(COST-net,0);
  const surplus=Math.max(net-COST,0);

  // Visit aggregation
  const visitMap={};
  records.forEach(r=>{
    if(!visitMap[r.date])visitMap[r.date]={date:r.date,saved:0,spent:0,items:[]};
    if(r.type==='🎢 入园')visitMap[r.date].saved+=r.saved;
    else visitMap[r.date].spent+=r.paid;
    visitMap[r.date].items.push(r);
  });
  const visits=Object.values(visitMap).sort((a,b)=>a.date.localeCompare(b.date));
  let cum=0;
  visits.forEach(v=>{cum+=v.saved-v.spent;v.cumNet=cum;v.net=v.saved-v.spent});
  const visitCount=visits.length;
  const avgNet=visitCount>0?net/visitCount:0;
  const needMore=avgNet>0?Math.ceil(remaining/avgNet):'∞';

  // Best and worst visits
  let bestIdx=-1,worstIdx=-1,bestNet=-Infinity,worstNet=Infinity;
  visits.forEach((v,i)=>{
    if(v.net>bestNet){bestNet=v.net;bestIdx=i}
    if(v.net<worstNet){worstNet=v.net;worstIdx=i}
  });

  // Category breakdown
  const catMap={};
  records.forEach(r=>{
    const key=r.type;
    if(!catMap[key])catMap[key]={type:key,saved:0,spent:0,count:0};
    catMap[key].saved+=r.saved;catMap[key].spent+=r.paid;catMap[key].count++;
  });
  const cats=Object.values(catMap).sort((a,b)=>(b.saved+b.spent)-(a.saved+a.spent));
  const maxCatVal=Math.max(...cats.map(c=>c.saved+c.spent));

  // Stamp level
  let stampText,stampClass;
  if(pct<50){stampText='WARM-UP';stampClass=''}
  else if(pct<100){stampText='ON FIRE';stampClass='gold'}
  else if(pct<130){stampText='BREAK EVEN';stampClass='green'}
  else{stampText='PROFIT MODE';stampClass='gold'}

  // Format update time
  const now=new Date();
  const updateStr=`${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;

  // Ticket number (pseudo)
  const ticketNo=`USJ-${now.getFullYear()}-${String(visitCount).padStart(3,'0')}`;

  const app=document.getElementById('app');
  app.innerHTML=`
    <!-- ===== HERO TICKET ===== -->
    <div class="ticket">
      <div class="ticket-top">
        <div class="ticket-brand">Universal Studios Beijing · Earn Tracker</div>
        <div class="ticket-title">年卡回本战绩票</div>
        <div class="ticket-meta">${NAME} · ¥${COST} · NO.${ticketNo}</div>
      </div>

      <hr class="ticket-perf">

      <div class="ticket-bottom">
        <!-- GIANT PCT -->
        <div style="margin-bottom:12px">
          <div class="hero-pct" id="heroPct">0<span class="hero-pct-suffix">%</span></div>
          <div class="hero-label">${done?'已超额回本':'回本进度'}</div>
        </div>

        <!-- STAMP -->
        <div style="margin-bottom:14px">
          <div class="stamp ${stampClass}">${stampText}</div>
        </div>

        <!-- NET VALUE -->
        <div class="net-row">
          <div class="net-badge ${net>=0?'pos':'neg'}">
            ${net>=0?'↑':'↓'} <span id="netVal">¥0</span>
          </div>
          ${done
            ?`<div class="remain-badge">已超额 <strong id="surplusVal">¥0</strong></div>`
            :`<div class="remain-badge">距回本还差 <strong id="remainVal">¥${remaining}</strong></div>`
          }
        </div>

        <!-- PROGRESS BAR -->
        <div class="progress-track">
          <div class="progress-bar">
            <div class="progress-fill ${pct<50?'warn':''}" id="progressFill"></div>
          </div>
          <div class="progress-labels">
            <span>¥0</span>
            <span>${done?'BREAK EVEN ✓':'¥'+COST}</span>
          </div>
        </div>

        <!-- STAT PILLS -->
        <div class="stat-row">
          <div class="stat-pill">
            <div class="stat-val g" id="statSaved">¥0</div>
            <div class="stat-lbl">门票节省</div>
          </div>
          <div class="stat-pill">
            <div class="stat-val r" id="statSpent">¥0</div>
            <div class="stat-lbl">园内花费</div>
          </div>
          <div class="stat-pill">
            <div class="stat-val a">${visitCount}<small style="font-size:9px;opacity:.5">次</small></div>
            <div class="stat-lbl">入园次数</div>
          </div>
        </div>
      </div>

      <div class="ticket-footer">
        <div class="ticket-footer-text">更新于 ${updateStr} · 第 ${visitCount} 次入园 · 长按保存这张战绩票</div>
      </div>
    </div>

    <!-- ===== PREDICTION ===== -->
    ${!done?`
    <div class="predict-card">
      <div class="predict-icon" style="background:var(--gold-bg)">🎯</div>
      <div class="predict-text">
        按当前均值，预计<strong>第 ${visitCount+needMore} 次</strong>入园即可回本<br>
        <span style="font-size:10px;color:var(--ink4)">每次平均净回 ¥${Math.round(avgNet)}</span>
      </div>
    </div>
    `:`
    <div class="predict-card">
      <div class="predict-icon" style="background:var(--green-bg)">🎊</div>
      <div class="predict-text" style="color:var(--green)">
        你在第 ${visitCount} 次已回本，之后每次都在赚门票<br>
        <span style="font-size:10px;color:var(--ink4)">共入园 ${visitCount} 次，每次平均净回 ¥${Math.round(avgNet)}</span>
      </div>
    </div>
    `}

    <!-- ===== TREND CHART ===== -->
    ${visits.length>=2?`
    <div class="section">
      <div class="section-head">
        <div class="section-title">回本闯关轨道</div>
        <div class="section-badge">${done?'CLEARED':'IN PROGRESS'}</div>
      </div>
      <div class="section-body">
        <div class="chart-wrap">
          <canvas id="trendCanvas"></canvas>
          <div class="chart-tooltip"></div>
        </div>
        <div class="chart-legend">
          <span><i style="background:${done?'var(--green)':'var(--blue)'}"></i> 累计净值</span>
          <span><i style="background:rgba(0,0,0,.08);border:1px dashed rgba(0,0,0,.15)"></i> 目标 ¥${COST}</span>
        </div>
      </div>
    </div>
    `:''}

    <!-- ===== VISIT RANKING ===== -->
    <div class="section">
      <div class="section-head">
        <div class="section-title">单次入园胜负榜</div>
        <div class="section-badge">${visitCount} 次</div>
      </div>
      <div class="section-body">
        ${visits.slice().reverse().map((v,ri)=>{
          const origIdx=visits.length-1-ri;
          const isBest=origIdx===bestIdx&&visitCount>1;
          const isWorst=origIdx===worstIdx&&visitCount>1&&worstNet<0;
          const total=v.saved+v.spent||1;
          return`<div class="visit-item${isBest?' best':''}${isWorst?' worst':''}">
            <div class="visit-header">
              <span>
                <span class="visit-idx">#${origIdx+1}</span>
                <span class="visit-date">${fmtDate(v.date)}</span>
                ${isBest?'<span class="visit-tag best">BEST</span>':''}
                ${isWorst?'<span class="visit-tag worst">WORST</span>':''}
              </span>
              <span class="visit-net ${v.net>=0?'pos':'neg'}">${v.net>=0?'+':''}¥${v.net}</span>
            </div>
            <div class="visit-bar-track">
              <div class="visit-bar-seg sv" style="flex-grow:${v.saved/total}">+${v.saved}</div>
              ${v.spent>0?`<div class="visit-bar-seg sp" style="flex-grow:${v.spent/total}">-${v.spent}</div>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- ===== SPENDING BREAKDOWN ===== -->
    <div class="section">
      <div class="section-head">
        <div class="section-title">花费黑洞</div>
      </div>
      <div class="section-body">
        ${cats.map(c=>{
          const val=c.type==='🎢 入园'?c.saved:c.spent;
          const color=CAT_COLORS[c.type]||'var(--blue)';
          const icon=ICONS[c.type]||'📌';
          const label=c.type.replace(/^[^\s]+\s/,'');
          return`<div class="breakdown-item">
            <div class="breakdown-icon">${icon}</div>
            <div class="breakdown-info">
              <div class="breakdown-name">${label}<span style="color:var(--ink4);font-size:9px;margin-left:4px">×${c.count}</span></div>
              <div class="breakdown-bar">
                <div class="breakdown-bar-fill" style="width:0%;background:${color}" data-target="${val/maxCatVal*100}"></div>
              </div>
            </div>
            <div class="breakdown-val" style="color:${c.type==='🎢 入园'?'var(--green)':'var(--red)'}">
              ${c.type==='🎢 入园'?'+':'−'}¥${val}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- ===== DETAIL LEDGER ===== -->
    <div class="section">
      <div class="section-head">
        <div class="section-title">消费明细</div>
        <div class="section-badge">${records.length} 条</div>
      </div>
      <div class="section-body">
        ${Object.entries(visitMap).sort((a,b)=>b[0].localeCompare(a[0])).map(([date,v],gi)=>{
          const dayNet=v.saved-v.spent;
          const isHidden=gi>=2;
          return`<div class="detail-group${isHidden?' detail-hidden':''}">
            <div class="detail-date">
              <span class="detail-date-dot"></span>
              ${fmtDate(date)}
              <span class="detail-date-net" style="color:${dayNet>=0?'var(--green)':'var(--red)'}">
                ${dayNet>=0?'+':''}¥${dayNet}
              </span>
            </div>
            ${v.items.map(i=>{
              const isE=i.type==='🎢 入园';
              const disp=isE?'+¥'+i.saved:(i.paid>0?'-¥'+i.paid:'¥0');
              const cls=isE&&i.saved>0?'pos':(i.paid>0?'neg':'z');
              return`<div class="detail-row">
                <div class="detail-left">
                  <span class="detail-icon">${ICONS[i.type]||'📌'}</span>
                  <span class="detail-name">${i.name}</span>
                </div>
                <span class="detail-val ${cls}">${disp}</span>
              </div>`;
            }).join('')}
          </div>`;
        }).join('')}
      </div>
      ${Object.keys(visitMap).length>2?`
      <div class="detail-toggle" id="detailToggle">
        <span>展开全部明细</span>
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      `:''}
    </div>

    <div class="footer">
      数据来自 Notion · ${updateStr}
    </div>
  `;

  // ============================================
  // ANIMATIONS (load-triggered, no scroll)
  // ============================================

  // Progress bar
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const fill=document.getElementById('progressFill');
    if(fill)fill.style.width=Math.min(pct,100)+'%';
  }));

  // Count-ups
  const heroPctEl=document.getElementById('heroPct');
  if(heroPctEl){
    const start=performance.now();
    const displayPct=Math.min(pct,999);
    (function step(now){
      const p=Math.min((now-start)/1400,1);
      const ease=1-Math.pow(1-p,4);
      heroPctEl.childNodes[0].textContent=(ease*displayPct).toFixed(1);
      if(p<1)requestAnimationFrame(step);
    })(start);
  }

  const netEl=document.getElementById('netVal');
  if(netEl)countUp(netEl,Math.abs(net),net>=0?'¥':'-¥','',1200);

  const surplusEl=document.getElementById('surplusVal');
  if(surplusEl)countUp(surplusEl,surplus,'¥','',1200);

  const savedEl=document.getElementById('statSaved');
  if(savedEl)countUp(savedEl,entrySaved,'¥','',1000);

  const spentEl=document.getElementById('statSpent');
  if(spentEl)countUp(spentEl,parkSpend,'¥','',1000);

  // Trend chart
  if(visits.length>=2){
    const trendCanvas=document.getElementById('trendCanvas');
    if(trendCanvas){
      setTimeout(()=>drawTrendChart(trendCanvas,visits,done),200);
      let resizeTimer;
      window.addEventListener('resize',()=>{
        clearTimeout(resizeTimer);
        resizeTimer=setTimeout(()=>drawTrendChart(trendCanvas,visits,done),200);
      });
    }
  }

  // Breakdown bar animation
  setTimeout(()=>{
    document.querySelectorAll('.breakdown-bar-fill').forEach(el=>{
      el.style.width=el.dataset.target+'%';
    });
  },400);

  // Detail toggle
  const toggle=document.getElementById('detailToggle');
  if(toggle){
    toggle.addEventListener('click',()=>{
      const hidden=document.querySelectorAll('.detail-hidden');
      const isOpen=toggle.classList.toggle('open');
      hidden.forEach(el=>el.classList.toggle('show',isOpen));
      toggle.querySelector('span').textContent=isOpen?'收起明细':'展开全部明细';
    });
  }

  // Confetti (short burst for break-even)
  if(done)setTimeout(confetti,800);
}

const DATA=[{"name": "餐饮", "date": "2026-02-08", "type": "🍔 餐饮", "original": 40, "paid": 40, "saved": 0}, {"name": "功夫熊猫吊杠", "date": "2026-02-08", "type": "🎪 活动/福利", "original": 40, "paid": 40, "saved": 0}, {"name": "停车", "date": "2026-02-08", "type": "🅿️ 停车", "original": 50, "paid": 50, "saved": 0}, {"name": "入园", "date": "2026-02-08", "type": "🎢 入园", "original": 300, "paid": 0, "saved": 300}];
render(DATA);
</script>
