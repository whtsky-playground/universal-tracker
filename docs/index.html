<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>环球影城 · 年卡回本战绩票</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Caveat:wght@400;600&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --paper:#f5f0e4;
  --paper2:#ede7d9;
  --paper-warm:#faf6ec;
  --ink:#1f2330;
  --ink2:#3a3d4a;
  --ink3:#6b6e7a;
  --ink4:#9b9da8;
  --green:#1a8a55;
  --green-bright:#22c06e;
  --green-bg:rgba(26,138,85,0.08);
  --red:#c44040;
  --red-bright:#e05555;
  --red-bg:rgba(196,64,64,0.08);
  --gold:#d4920a;
  --gold-bright:#f0a81c;
  --gold-bg:rgba(212,146,10,0.08);
  --gold-gradient:linear-gradient(135deg,#d4920a,#f0a81c);
  --blue:#3a7bd5;
  --blue-bright:#4cc1ff;
  --stamp-red:#c0392b;
  --stamp-green:#1a8a55;
  --stamp-gold:#c87f0a;
  --ink-handwrite:#2c3e50;
  --radius:12px;
  --font-num:'Bebas Neue','Noto Sans SC',sans-serif;
  --font-mono:'IBM Plex Mono','Noto Sans SC',monospace;
  --font-body:'Noto Sans SC',-apple-system,system-ui,sans-serif;
  --font-hand:'Caveat','Noto Sans SC',cursive;
}

html{scroll-behavior:smooth}
body{
  font-family:var(--font-body);
  background:var(--paper);color:var(--ink);
  min-height:100vh;min-height:100dvh;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

/* === PAPER TEXTURE === */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.35;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.018;
  background:repeating-linear-gradient(45deg,transparent,transparent 8px,var(--ink) 8px,var(--ink) 8.5px);
}

/* === LAYOUT === */
.container{
  max-width:460px;margin:0 auto;padding:16px 12px 40px;
  position:relative;z-index:2;
}

/* === HERO TICKET === */
.ticket{
  position:relative;
  background:#fffdf7;
  border:1.5px solid rgba(0,0,0,.08);
  border-radius:20px;
  margin-bottom:16px;
  box-shadow:0 1px 3px rgba(0,0,0,.04),0 8px 32px rgba(0,0,0,.06);
  overflow:visible;
}
.ticket::before,.ticket::after{
  content:'';position:absolute;
  width:26px;height:26px;border-radius:50%;
  background:var(--paper);
  border:1.5px solid rgba(0,0,0,.08);
  top:50%;transform:translateY(-50%);z-index:3;
}
.ticket::before{left:-14px}
.ticket::after{right:-14px}

.ticket-perf{
  position:relative;margin:0 14px;
  border:none;border-top:2px dashed rgba(0,0,0,.1);
}

/* Ticket Top */
.ticket-top{
  padding:20px 22px 12px;
  text-align:center;position:relative;
}
.ticket-brand{
  font-family:var(--font-mono);
  font-size:9px;font-weight:600;
  letter-spacing:2.5px;text-transform:uppercase;
  color:var(--ink4);margin-bottom:2px;
}
.ticket-meta{
  font-family:var(--font-mono);
  font-size:9px;color:var(--ink4);letter-spacing:.5px;
  margin-bottom:8px;
}
.ticket-slogan{
  font-family:var(--font-hand);
  font-size:22px;font-weight:600;
  color:var(--ink-handwrite);
  transform:rotate(-1.5deg);
  line-height:1.2;
  opacity:.85;
}

/* Ticket Bottom */
.ticket-bottom{
  padding:14px 22px 8px;
  position:relative;text-align:center;
}

/* Giant Percentage + Stamp Overlay */
.hero-block{
  position:relative;display:inline-block;
  margin-bottom:6px;
}
.hero-pct{
  font-family:var(--font-num);
  font-size:96px;letter-spacing:-1px;line-height:.85;
  color:var(--ink);position:relative;
}
.hero-pct-suffix{
  font-family:var(--font-num);
  font-size:42px;
  vertical-align:baseline;
  opacity:.4;margin-left:2px;
}

/* Stamp overlaid on hero */
.stamp{
  position:absolute;
  right:-16px;bottom:4px;
  padding:5px 14px;
  border:3px solid var(--stamp-red);
  border-radius:6px;
  font-family:var(--font-num);
  font-size:14px;letter-spacing:2.5px;
  color:var(--stamp-red);
  transform:rotate(-12deg);
  opacity:.8;text-transform:uppercase;
  z-index:2;
}
.stamp::before{
  content:'';position:absolute;inset:-2px;
  border:1px solid var(--stamp-red);
  border-radius:8px;opacity:.4;
}
.stamp::after{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 128 128' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.5' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:64px;mix-blend-mode:screen;opacity:.35;border-radius:4px;
}
.stamp.green{border-color:var(--stamp-green);color:var(--stamp-green)}
.stamp.green::before{border-color:var(--stamp-green)}
.stamp.gold{border-color:var(--stamp-gold);color:var(--stamp-gold)}
.stamp.gold::before{border-color:var(--stamp-gold)}

/* Status Line */
.status-line{
  display:flex;align-items:center;justify-content:center;
  gap:6px;flex-wrap:wrap;
  font-family:var(--font-mono);
  font-size:12px;color:var(--ink3);
  margin-bottom:10px;font-weight:500;
}
.status-line .val{color:var(--ink);font-weight:700}
.status-line .val.g{color:var(--green)}
.status-line .val.r{color:var(--red)}
.status-line .sep{opacity:.3;font-size:10px}

/* Barcode + Save Hint */
.ticket-barcode{
  height:20px;margin:6px 28px 0;opacity:.07;
  background:repeating-linear-gradient(90deg,
    var(--ink) 0 1px,transparent 1px 3px,
    var(--ink) 3px 5px,transparent 5px 6px,
    var(--ink) 6px 7px,transparent 7px 9px,
    var(--ink) 9px 10px,transparent 10px 13px,
    var(--ink) 13px 15px,transparent 15px 17px,
    var(--ink) 17px 18px,transparent 18px 20px
  );border-radius:1px;
}
.ticket-save-hint{
  padding:8px 22px 12px;text-align:center;
  font-family:var(--font-mono);
  font-size:8px;color:var(--ink4);letter-spacing:1px;
  opacity:.5;
}

/* === SEASON PROGRESS TRACK === */
.season-card{
  background:#fffdf7;
  border:1px solid rgba(0,0,0,.06);
  border-radius:var(--radius);
  margin-bottom:14px;padding:16px;
  box-shadow:0 1px 3px rgba(0,0,0,.03);
}
.season-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.season-title{font-size:12px;font-weight:700;color:var(--ink2);letter-spacing:.5px}
.season-badge{
  font-family:var(--font-mono);font-size:9px;font-weight:600;
  padding:3px 10px;border-radius:100px;
  background:var(--gold-bg);color:var(--gold);letter-spacing:1px;
}
.track-wrap{position:relative;padding:0 16px;margin-bottom:8px}
.track-rail{
  height:6px;border-radius:3px;
  background:rgba(0,0,0,.06);
  position:relative;
}
.track-fill{
  position:absolute;top:0;left:0;
  height:100%;border-radius:3px;
  background:linear-gradient(90deg,var(--green),var(--green-bright));
  width:0%;transition:width 1.8s cubic-bezier(.16,1,.3,1);
}
.track-fill.over{
  background:linear-gradient(90deg,var(--green),var(--green-bright) 80%,var(--gold-bright));
}
.track-ms{
  position:absolute;top:50%;transform:translate(-50%,-50%);z-index:2;
}
.track-ms-icon{
  width:30px;height:30px;border-radius:50%;
  background:#fffdf7;border:2.5px solid rgba(0,0,0,.1);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;transition:all .4s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
.track-ms.reached .track-ms-icon{
  border-color:var(--green);
  box-shadow:0 0 0 4px rgba(26,138,85,.12);
  transform:scale(1);
}
.track-ms.reached.gold .track-ms-icon{
  border-color:var(--gold);
  box-shadow:0 0 0 4px rgba(212,146,10,.15);
}
.track-ms.inactive .track-ms-icon{filter:grayscale(1);opacity:.4}
@keyframes nodeBounce{
  0%{transform:scale(0.5);opacity:0}
  60%{transform:scale(1.2)}
  100%{transform:scale(1);opacity:1}
}
.track-ms.bounce .track-ms-icon{animation:nodeBounce .4s cubic-bezier(.34,1.56,.64,1) forwards}

.track-labels{
  display:flex;justify-content:space-between;
  padding:0 4px;margin-top:22px;
}
.track-label{
  width:60px;text-align:center;
  font-size:8px;color:var(--ink4);
  font-family:var(--font-mono);letter-spacing:.3px;
  line-height:1.3;
}
.track-label.active{color:var(--ink2);font-weight:600}
.track-footer{
  text-align:center;margin-top:12px;
  font-size:11px;color:var(--ink3);
  font-family:var(--font-mono);line-height:1.6;
}

/* === MINI TICKETS (data overview) === */
.mini-tickets{display:flex;gap:8px;margin-bottom:14px}
.mini-ticket{
  flex:1;background:#fffdf7;
  border:1px solid rgba(0,0,0,.06);
  border-radius:10px;padding:14px 6px 12px;
  text-align:center;
  box-shadow:0 1px 3px rgba(0,0,0,.03);
  transition:transform .3s;
}
.mini-ticket:nth-child(1){transform:rotate(-1.5deg)}
.mini-ticket:nth-child(2){transform:rotate(0.3deg)}
.mini-ticket:nth-child(3){transform:rotate(1.5deg)}
.mini-ticket-icon{font-size:18px;margin-bottom:4px}
.mini-ticket-val{
  font-family:var(--font-mono);
  font-size:18px;font-weight:700;
  margin-bottom:2px;line-height:1.1;
}
.mini-ticket-label{
  font-family:var(--font-mono);font-size:8px;font-weight:600;
  color:var(--ink4);letter-spacing:1.5px;text-transform:uppercase;
}

/* === SECTION CARDS === */
.section{
  background:#fffdf7;
  border:1px solid rgba(0,0,0,.06);
  border-radius:var(--radius);
  margin-bottom:14px;overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.03);
}
.section-head{
  padding:14px 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(0,0,0,.04);
}
.section-title{font-size:12px;font-weight:700;color:var(--ink2);letter-spacing:.5px}
.section-badge{
  font-family:var(--font-mono);font-size:9px;font-weight:600;
  padding:3px 8px;border-radius:100px;
  background:rgba(0,0,0,.04);color:var(--ink3);
}
.section-body{padding:0 16px 16px}

/* === TREND CHART === */
.chart-wrap{position:relative;width:100%;height:210px;margin:8px 0}
#trendCanvas{width:100%;height:100%;display:block}
.chart-tooltip{
  position:absolute;padding:5px 10px;
  background:#fffdf7;border:1px solid rgba(0,0,0,.1);
  border-radius:6px;font-size:10px;font-weight:600;
  font-family:var(--font-mono);
  pointer-events:none;opacity:0;transition:opacity .2s;
  white-space:nowrap;z-index:10;
  box-shadow:0 2px 8px rgba(0,0,0,.08);color:var(--ink);
}
.chart-legend{display:flex;gap:14px;justify-content:center;margin-top:4px}
.chart-legend span{font-size:9px;color:var(--ink4);display:flex;align-items:center;gap:4px}
.chart-legend i{display:inline-block;width:10px;height:3px;border-radius:2px}

/* === VISIT CARDS === */
.visit-cards{padding-top:8px}
.visit-card{
  background:var(--paper-warm);
  border:1.5px solid rgba(0,0,0,.06);
  border-radius:10px;
  padding:12px 14px;margin-bottom:8px;
  position:relative;
  transition:transform .2s;
}
.visit-card.best-card{
  border-color:var(--gold);
  background:linear-gradient(135deg,#fffef8,#fef8e7);
  box-shadow:0 0 0 1px rgba(212,146,10,.08);
}
.visit-card.worst-card{
  border:1.5px dashed rgba(196,64,64,.4);
  background:#fffafa;
}
.visit-card-sticker{
  position:absolute;top:-7px;left:12px;
  font-family:var(--font-mono);font-size:8px;font-weight:700;
  padding:2px 8px;border-radius:3px;
  letter-spacing:1px;color:#fff;
  line-height:1.4;
}
.visit-card-sticker.best{background:var(--gold)}
.visit-card-sticker.worst{background:var(--red)}
.visit-card-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:8px;
}
.visit-card-left{display:flex;align-items:center;gap:8px}
.visit-card-idx{
  width:28px;height:28px;border-radius:50%;
  background:rgba(0,0,0,.04);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:10px;font-weight:700;
  color:var(--ink3);flex-shrink:0;
}
.visit-card-date{font-size:11px;font-weight:600;color:var(--ink2)}
.visit-card-net{
  font-family:var(--font-mono);font-size:14px;font-weight:700;
}
.visit-card-net.pos{color:var(--green)}
.visit-card-net.neg{color:var(--red)}
.visit-bar-track{
  height:20px;border-radius:5px;display:flex;gap:2px;
  overflow:hidden;background:rgba(0,0,0,.04);
}
.visit-bar-seg{
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:700;font-family:var(--font-mono);
  color:#fff;border-radius:4px;min-width:24px;
  transition:flex-grow 1s cubic-bezier(.16,1,.3,1);
}
.visit-bar-seg.sv{background:var(--green)}
.visit-bar-seg.sp{background:var(--red)}

.visit-toggle{
  text-align:center;padding:6px;
  font-size:11px;color:var(--ink4);font-weight:500;
  cursor:pointer;font-family:var(--font-mono);
  transition:color .2s;
}
.visit-toggle:hover{color:var(--ink2)}

/* === SPENDING FLOW (bidirectional) === */
.flow-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 0;
}
.flow-icon{font-size:15px;width:22px;text-align:center;flex-shrink:0}
.flow-name{font-size:11px;font-weight:500;color:var(--ink2);width:42px;flex-shrink:0}
.flow-bar-wrap{
  flex:1;position:relative;height:18px;
  display:flex;align-items:center;
}
.flow-bar-left{
  flex:1;display:flex;justify-content:flex-end;
  height:100%;position:relative;
}
.flow-bar-right{
  flex:1;display:flex;justify-content:flex-start;
  height:100%;position:relative;
}
.flow-center{
  width:2px;height:100%;background:rgba(0,0,0,.15);
  flex-shrink:0;border-radius:1px;
}
.flow-bar{
  height:14px;border-radius:4px;margin:2px 0;
  transition:width 1.2s cubic-bezier(.16,1,.3,1);
  min-width:0;
}
.flow-bar.earn{background:var(--green);margin-left:3px}
.flow-bar.spend{background:var(--red);margin-right:3px}
.flow-val{
  font-family:var(--font-mono);font-size:10px;font-weight:600;
  flex-shrink:0;width:52px;text-align:right;
}

/* === DETAIL ROWS === */
.detail-group{margin-bottom:10px}
.detail-group:last-child{margin-bottom:0}
.detail-date{
  font-family:var(--font-mono);
  font-size:10px;font-weight:600;color:var(--ink3);
  padding:5px 0;display:flex;align-items:center;gap:6px;
  border-bottom:1px solid rgba(0,0,0,.05);margin-bottom:3px;
}
.detail-date-num{
  width:20px;height:20px;border-radius:50%;
  background:rgba(0,0,0,.04);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:8px;font-weight:700;
  color:var(--ink3);flex-shrink:0;
}
.detail-date-net{
  margin-left:auto;font-family:var(--font-mono);font-weight:700;font-size:10px;
}
.detail-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:5px 0 5px 10px;
}
.detail-left{display:flex;align-items:center;gap:6px;min-width:0}
.detail-icon{font-size:12px;width:18px;text-align:center;flex-shrink:0}
.detail-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink2)}
.detail-val{font-family:var(--font-mono);font-size:11px;font-weight:600;flex-shrink:0}
.detail-val.pos{color:var(--green)}.detail-val.neg{color:var(--red)}.detail-val.z{color:var(--ink4)}

/* Perforated separator between detail groups */
.detail-perf{
  border:none;border-top:1px dashed rgba(0,0,0,.06);
  margin:4px 0;
}

/* Collapsible */
.detail-toggle{
  display:flex;align-items:center;justify-content:center;
  padding:10px;cursor:pointer;gap:4px;
  font-size:11px;color:var(--ink4);font-weight:500;
  border-top:1px solid rgba(0,0,0,.04);transition:color .2s;
}
.detail-toggle:hover{color:var(--ink2)}
.detail-toggle svg{transition:transform .3s}
.detail-toggle.open svg{transform:rotate(180deg)}
.detail-hidden{display:none}
.detail-hidden.show{display:block}

/* === SEASON FOOTER === */
.season-footer{
  text-align:center;padding:20px 16px 8px;
  position:relative;
}
.season-footer::before{
  content:'';display:block;
  width:60px;height:1px;
  background:rgba(0,0,0,.08);
  margin:0 auto 16px;
}
.season-footer-tag{
  font-family:var(--font-mono);
  font-size:10px;font-weight:600;
  color:var(--ink3);letter-spacing:2px;
  margin-bottom:8px;
}
.season-footer-quote{
  font-family:var(--font-hand);
  font-size:17px;color:var(--ink-handwrite);
  line-height:1.4;margin-bottom:10px;
  opacity:.75;
}
.season-footer-source{
  font-family:var(--font-mono);
  font-size:8px;color:var(--ink4);
  letter-spacing:.5px;opacity:.5;
}

/* === CONFETTI === */
.confetti-box{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden}
.cft{position:absolute;top:-16px;animation:cfall 3s cubic-bezier(.25,.46,.45,.94) forwards}
@keyframes cfall{
  0%{transform:translateY(0) rotate(0) scale(1);opacity:1}
  70%{opacity:1}
  100%{transform:translateY(105vh) rotate(720deg) scale(.3);opacity:0}
}

/* === LOADING === */
.loading{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:60vh;gap:12px;
}
.loading-ring{
  width:32px;height:32px;border:2.5px solid rgba(0,0,0,.08);
  border-top-color:var(--ink2);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:12px;color:var(--ink4);font-family:var(--font-mono)}

/* Scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:2px}

/* === REDUCED MOTION === */
@media(prefers-reduced-motion:reduce){
  *{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
}

/* === DESKTOP === */
@media(min-width:520px){
  .container{padding:32px 16px 60px}
  .ticket{border-radius:24px}
  .hero-pct{font-size:112px}
  .hero-pct-suffix{font-size:48px}
}
</style>
</head>
<body>

<div class="container" id="app">
  <div class="loading">
    <div class="loading-ring"></div>
    <div class="loading-text">LOADING</div>
  </div>
</div>

<script>
// ============================================
// CONFIG
// ============================================
const COST=1688,NAME='悠享年卡';
const ICONS={'🎢 入园':'🎢','🍔 餐饮':'🍔','🎁 商品折扣':'🎁','🅿️ 停车':'🅿️','🎪 活动/福利':'🎪','🏨 酒店折扣':'🏨'};
const CAT_COLORS={
  '🎢 入园':'var(--green)','🍔 餐饮':'#d97706','🎁 商品折扣':'#c2185b',
  '🅿️ 停车':'var(--blue)','🎪 活动/福利':'#7c3aed','🏨 酒店折扣':'#0891b2'
};
const MILESTONES=[
  {pct:25,icon:'🔥',label:'热身完毕'},
  {pct:50,icon:'⚡',label:'半程达成'},
  {pct:75,icon:'🎯',label:'终点在望'},

function fmtDate(d){
  const dt=new Date(d+'T00:00:00');
  const w=['日','一','二','三','四','五','六'];
  return`${dt.getMonth()+1}月${dt.getDate()}日 周${w[dt.getDay()]}`;
}
function fmtMoney(v){return v>=0?'+¥'+v:'-¥'+Math.abs(v)}

function countUp(el,target,prefix='',suffix='',duration=1200){
  const start=performance.now();
  (function step(now){
    const p=Math.min((now-start)/duration,1);
    const ease=1-Math.pow(1-p,4);
    const val=Math.round(ease*target);
    el.textContent=prefix+val+suffix;
    if(p<1)requestAnimationFrame(step);
  })(start);
}

function confetti(){
  const box=document.createElement('div');box.className='confetti-box';
  const cols=['#1a8a55','#22c06e','#d4920a','#f0a81c','#c44040','#3a7bd5','#7c3aed','#e05555'];
  for(let i=0;i<80;i++){
    const c=document.createElement('div');c.className='cft';
    const size=4+Math.random()*8;
    const isCircle=Math.random()>.5;
    c.style.cssText=`
      left:${Math.random()*100}%;
      width:${size}px;height:${isCircle?size:size*2.5}px;
      background:${cols[~~(Math.random()*cols.length)]};
      border-radius:${isCircle?'50%':'2px'};
      animation-delay:${Math.random()*1.8}s;
      animation-duration:${2+Math.random()*1.5}s;
    `;
    box.appendChild(c);
  }
  document.body.appendChild(box);
  setTimeout(()=>box.remove(),5000);
}

// ============================================
// TREND CHART (upgraded)
// ============================================
function drawTrendChart(canvas,visits,done,bestIdx,worstIdx){
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.parentElement.getBoundingClientRect();
  const W=rect.width,H=rect.height;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  const pad={t:24,r:16,b:30,l:42};
  const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;

  const maxVal=Math.max(COST*1.15,...visits.map(v=>v.cumNet))*1.05;
  const x=i=>pad.l+(visits.length===1?cW/2:i/(visits.length-1)*cW);
  const y=v=>pad.t+cH-(v/maxVal)*cH;

  // Grid
  ctx.strokeStyle='rgba(0,0,0,0.04)';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const gy=pad.t+(cH/4)*i;
    ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(W-pad.r,gy);ctx.stroke();
  }

  // Goal line
  const goalY=y(COST);
  ctx.save();
  ctx.setLineDash([5,4]);
  ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad.l,goalY);ctx.lineTo(W-pad.r,goalY);ctx.stroke();
  ctx.restore();

  // Goal label with flag
  ctx.font="600 9px 'IBM Plex Mono',monospace";
  ctx.fillStyle='rgba(0,0,0,0.22)';ctx.textAlign='end';
  ctx.fillText('¥'+COST+' GOAL 🏁',W-pad.r,goalY-5);

  // Y labels
  ctx.textAlign='end';ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.font="500 9px 'IBM Plex Mono',monospace";
  for(let i=0;i<=4;i++){
    const val=Math.round(maxVal*(1-i/4));
    ctx.fillText('¥'+val,pad.l-6,pad.t+(cH/4)*i+3);
  }

  // X labels as date stamps
  ctx.textAlign='center';
  visits.forEach((v,i)=>{
    const dt=new Date(v.date+'T00:00:00');
    const label=(dt.getMonth()+1)+'/'+dt.getDate();
    ctx.fillStyle='rgba(0,0,0,0.15)';
    ctx.fillText(label,x(i),H-8);
  });

  if(visits.length<2)return;

  // Points
  const pts=visits.map((v,i)=>({x:x(i),y:y(v.cumNet)}));

  // Cardinal spline
  function getCardinalPoints(pts,tension=0.3){
    const cp=[];
    for(let i=0;i<pts.length;i++){
      const p0=pts[Math.max(0,i-1)],p1=pts[i];
      const p2=pts[Math.min(pts.length-1,i+1)];
      const p3=pts[Math.min(pts.length-1,i+2)];
      cp.push({
        cp1x:p1.x+(p2.x-p0.x)*tension/3,
        cp1y:p1.y+(p2.y-p0.y)*tension/3,
        cp2x:p2.x-(p3.x-p1.x)*tension/3,
        cp2y:p2.y-(p3.y-p1.y)*tension/3,
        x:p2.x,y:p2.y
      });
    }
    return cp;
  }
  const cp=getCardinalPoints(pts);

  // Hatching pattern for area fill
  const patCvs=document.createElement('canvas');
  patCvs.width=8;patCvs.height=8;
  const pctx=patCvs.getContext('2d');
  pctx.strokeStyle=done?'rgba(26,138,85,0.1)':'rgba(58,123,213,0.08)';
  pctx.lineWidth=1;
  pctx.beginPath();pctx.moveTo(0,8);pctx.lineTo(8,0);pctx.stroke();
  pctx.beginPath();pctx.moveTo(-2,2);pctx.lineTo(2,-2);pctx.stroke();
  pctx.beginPath();pctx.moveTo(6,10);pctx.lineTo(10,6);pctx.stroke();
  const hatch=ctx.createPattern(patCvs,'repeat');

  // Area fill (hatching + gradient blend)
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(pts[0].x,y(0));
  ctx.lineTo(pts[0].x,pts[0].y);
  for(let i=0;i<cp.length-1;i++){
    ctx.bezierCurveTo(cp[i].cp1x,cp[i].cp1y,cp[i].cp2x,cp[i].cp2y,cp[i].x,cp[i].y);
  }
  ctx.lineTo(pts[pts.length-1].x,y(0));
  ctx.closePath();
  ctx.fillStyle=hatch;ctx.fill();
  ctx.restore();

  // Soft gradient overlay on area
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(pts[0].x,y(0));ctx.lineTo(pts[0].x,pts[0].y);
  for(let i=0;i<cp.length-1;i++){
    ctx.bezierCurveTo(cp[i].cp1x,cp[i].cp1y,cp[i].cp2x,cp[i].cp2y,cp[i].x,cp[i].y);
  }
  ctx.lineTo(pts[pts.length-1].x,y(0));ctx.closePath();
  const areaGrad=ctx.createLinearGradient(0,pad.t,0,pad.t+cH);
  areaGrad.addColorStop(0,done?'rgba(26,138,85,0.08)':'rgba(58,123,213,0.06)');
  areaGrad.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=areaGrad;ctx.fill();
  ctx.restore();

  // Main line
  const lineColor=done?'#1a8a55':'#3a7bd5';
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=0;i<cp.length-1;i++){
    ctx.bezierCurveTo(cp[i].cp1x,cp[i].cp1y,cp[i].cp2x,cp[i].cp2y,cp[i].x,cp[i].y);
  }
  ctx.strokeStyle=lineColor;ctx.lineWidth=2.5;
  ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();

  // Data points — stamp style (double circle)
  pts.forEach((p,i)=>{
    const isBE=i>0&&visits[i].cumNet>=COST&&visits[i-1].cumNet<COST;
    const isBest=i===bestIdx&&visits.length>1;
    const isWorst=i===worstIdx&&visits.length>1&&visits[worstIdx].net<0;

    // Outer ring
    const outerR=isBE?7:isBest||isWorst?5.5:4;
    ctx.beginPath();ctx.arc(p.x,p.y,outerR,0,Math.PI*2);
    ctx.strokeStyle=isBE?'var(--gold)':isBest?'var(--green)':isWorst?'var(--red)':lineColor;
    ctx.lineWidth=1.5;ctx.stroke();
    // Inner fill
    ctx.beginPath();ctx.arc(p.x,p.y,outerR-2,0,Math.PI*2);
    ctx.fillStyle=isBE?'var(--gold-bright)':isBest?'var(--green)':isWorst?'var(--red)':'#fffdf7';
    ctx.fill();
    // Center dot
    if(!isBE&&!isBest&&!isWorst){
      ctx.beginPath();ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
      ctx.fillStyle=lineColor;ctx.fill();
    }

    // Annotations
    ctx.font="bold 8px 'IBM Plex Mono',monospace";ctx.textAlign='center';
    if(isBE){
      ctx.fillStyle='var(--gold)';
      ctx.fillText('🏆 BREAK EVEN',p.x,p.y-12);
    }else if(isBest){
      ctx.fillStyle='var(--green)';
      ctx.fillText('BEST',p.x,p.y-10);
    }else if(isWorst){
      ctx.fillStyle='var(--red)';
      ctx.fillText('WORST',p.x,p.y-10);
    }
  });

  // Projection if not done
  if(!done&&visits.length>=2){
    const lastPt=pts[pts.length-1];
    const avgPerVisit=visits[visits.length-1].cumNet/visits.length;
    if(avgPerVisit>0){
      const projEndX=Math.min(W-pad.r,lastPt.x+(W-pad.r-lastPt.x)*0.5);
      const projEndY=y(Math.min(COST,maxVal*0.95));
      ctx.save();ctx.setLineDash([3,3]);
      ctx.strokeStyle='rgba(58,123,213,0.3)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(lastPt.x,lastPt.y);ctx.lineTo(projEndX,projEndY);ctx.stroke();
      ctx.restore();
    }
  }

  // Tooltip
  const tooltip=canvas.parentElement.querySelector('.chart-tooltip');
  function handleHover(mx){
    let closest=-1,minD=Infinity;
    pts.forEach((p,i)=>{const d=Math.abs(p.x-mx);if(d<minD){minD=d;closest=i}});
    if(closest>=0&&minD<40){
      const v=visits[closest];
      const dt=new Date(v.date+'T00:00:00');
      tooltip.innerHTML=`${dt.getMonth()+1}/${dt.getDate()} · 累计 <span style="color:${v.cumNet>=COST?'var(--green)':'var(--blue)'}">¥${v.cumNet}</span> · 当日 ${v.net>=0?'+':''}¥${v.net}`;
      tooltip.style.opacity='1';
      tooltip.style.left=Math.min(Math.max(pts[closest].x-60,0),W-140)+'px';
      tooltip.style.top=(pts[closest].y-34)+'px';
    }else{
      tooltip.style.opacity='0';
    }
  }
  canvas.addEventListener('mousemove',e=>{
    const br=canvas.getBoundingClientRect();handleHover(e.clientX-br.left);
  });
  canvas.addEventListener('mouseleave',()=>{tooltip.style.opacity='0'});
  canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    const br=canvas.getBoundingClientRect();handleHover(e.touches[0].clientX-br.left);
  },{passive:false});
  canvas.addEventListener('touchend',()=>{tooltip.style.opacity='0'});
}

// RENDER

function render(records){
  const entrySaved=records.filter(r=>r.type==='🎢 入园').reduce((s,r)=>s+r.saved,0);
  const parkSpend=records.filter(r=>r.type!=='🎢 入园').reduce((s,r)=>s+r.paid,0);
  const net=entrySaved-parkSpend;
  const pct=Math.min(Math.max(net/COST*100,0),999);
  const done=net>=COST;
  const remaining=Math.max(COST-net,0);
  const surplus=Math.max(net-COST,0);

  // Visit aggregation
  const visitMap={};
  records.forEach(r=>{
    if(!visitMap[r.date])visitMap[r.date]={date:r.date,saved:0,spent:0,items:[]};
    if(r.type==='🎢 入园')visitMap[r.date].saved+=r.saved;
    else visitMap[r.date].spent+=r.paid;
    visitMap[r.date].items.push(r);
  });
  const visits=Object.values(visitMap).sort((a,b)=>a.date.localeCompare(b.date));
  let cum=0;
  visits.forEach(v=>{cum+=v.saved-v.spent;v.cumNet=cum;v.net=v.saved-v.spent});
  const visitCount=visits.length;
  const avgNet=visitCount>0?net/visitCount:0;
  const needMore=avgNet>0?Math.ceil(remaining/avgNet):'∞';

  // Best/worst
  let bestIdx=-1,worstIdx=-1,bestNet=-Infinity,worstNet=Infinity;
  visits.forEach((v,i)=>{
    if(v.net>bestNet){bestNet=v.net;bestIdx=i}
    if(v.net<worstNet){worstNet=v.net;worstIdx=i}
  });

  // Categories
  const catMap={};
  records.forEach(r=>{
    const key=r.type;
    if(!catMap[key])catMap[key]={type:key,saved:0,spent:0,count:0};
    catMap[key].saved+=r.saved;catMap[key].spent+=r.paid;catMap[key].count++;
  });
  const cats=Object.values(catMap).sort((a,b)=>(b.saved+b.spent)-(a.saved+a.spent));

  // Stamp
  let stampText,stampClass;
  if(pct<50){stampText='WARM-UP';stampClass=''}
  else if(pct<100){stampText='ON FIRE';stampClass='gold'}
  else if(pct<130){stampText='BREAK EVEN';stampClass='green'}
  else{stampText='PROFIT MODE';stampClass='gold'}

  // Slogan
  let slogan;
  if(pct<30)slogan='「旅程才刚开始」';
  else if(pct<70)slogan='「势头正猛」';
  else if(pct<100)slogan='「终点在望」';
  else slogan='「你已经赚回来了」';

  // Footer commentary
  let commentary;
  if(pct<30)commentary='才刚热身，别急，后面还有好多次';
  else if(pct<60)commentary='已经是半程战士了，继续保持';
  else if(pct<100)commentary='冲刺阶段！可以开始期待回本庆典了';
  else commentary='年卡钱早就赚回来了，现在每次都是纯赚';

  // Days since first visit
  const now=new Date();
  const firstVisitDate=visits.length>0?new Date(visits[0].date+'T00:00:00'):now;
  const daysSince=Math.max(1,Math.floor((now-firstVisitDate)/86400000));

  const updateStr=`${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  const ticketNo=`USJ-${now.getFullYear()}-${String(visitCount).padStart(3,'0')}`;

  // Season dates
  const startYear=firstVisitDate.getFullYear();
  const startMonth=String(firstVisitDate.getMonth()+1).padStart(2,'0');
  const seasonRange=`${startYear}.${startMonth} — ${startYear+1}.${startMonth}`;

  // Break-even visit index
  const breakEvenIdx=visits.findIndex((v,i)=>i>0&&v.cumNet>=COST&&visits[i-1].cumNet<COST);

  // Max flow value for bidirectional bars
  const maxFlowVal=Math.max(...cats.map(c=>c.type==='🎢 入园'?c.saved:c.spent),1);

  const app=document.getElementById('app');
  app.innerHTML=`
    <!-- ===== HERO TICKET (slim) ===== -->
    <div class="ticket">
      <div class="ticket-top">
        <div class="ticket-brand">SEASON PASS · NO.${ticketNo}</div>
        <div class="ticket-meta">${NAME} · ¥${COST}</div>
        <div class="ticket-slogan">${slogan}</div>
      </div>

      <hr class="ticket-perf">

      <div class="ticket-bottom">
        <div class="hero-block">
          <div class="hero-pct" id="heroPct">0<span class="hero-pct-suffix">%</span></div>
          <div class="stamp ${stampClass}">${stampText}</div>
        </div>

        <div class="status-line">
          <span>${net>=0?'':'−'}¥<span class="val ${net>=0?'g':'r'}" id="netVal">0</span></span>
          <span class="sep">·</span>
          <span>入园 <span class="val">${visitCount}</span> 次</span>
          <span class="sep">·</span>
          <span>持卡 <span class="val">${daysSince}</span> 天</span>
        </div>

        <div class="ticket-barcode"></div>
        <div class="ticket-save-hint">LONG PRESS TO SAVE · 长按保存这张战绩票</div>
      </div>
    </div>

    <!-- ===== SEASON PROGRESS TRACK ===== -->
    <div class="season-card">
      <div class="season-header">
        <div class="season-title">赛季进度</div>
        <div class="season-badge">SEASON 1</div>
      </div>
      <div class="track-wrap">
        <div class="track-rail">
          <div class="track-fill${pct>100?' over':''}" id="trackFill"></div>
          ${MILESTONES.map((m,i)=>{
            const reached=pct>=m.pct;
            const isGold=m.pct===100;
            return`<div class="track-ms ${reached?'reached':'inactive'}${isGold&&reached?' gold':''}" style="left:${Math.min(m.pct,100)}%" id="ms${i}">
              <div class="track-ms-icon">${m.icon}</div>
            </div>`;
          }).join('')}
        </div>
        <div class="track-labels">
          ${MILESTONES.map(m=>`<div class="track-label${pct>=m.pct?' active':''}">${m.label}</div>`).join('')}
        </div>
      </div>
      <div class="track-footer">
        ${done
          ?`已超额 <strong style="color:var(--gold)">¥${surplus}</strong> · 每次都是纯赚`
          :`距回本还差 <strong>¥${remaining}</strong> · 预计再去 <strong>${needMore}</strong> 次`
        }
      </div>
    </div>

    <!-- ===== DATA OVERVIEW (3 mini tickets) ===== -->
    <div class="mini-tickets">
      <div class="mini-ticket">
        <div class="mini-ticket-icon">🎫</div>
        <div class="mini-ticket-val" style="color:var(--green)" id="mtSaved">¥0</div>
        <div class="mini-ticket-label">SAVED</div>
      </div>
      <div class="mini-ticket">
        <div class="mini-ticket-icon">🛍️</div>
        <div class="mini-ticket-val" style="color:var(--red)" id="mtSpent">¥0</div>
        <div class="mini-ticket-label">SPENT</div>
      </div>
      <div class="mini-ticket">
        <div class="mini-ticket-icon">📊</div>
        <div class="mini-ticket-val" style="color:var(--blue)" id="mtAvg">¥0</div>
        <div class="mini-ticket-label">AVG/VISIT</div>
      </div>
    </div>

    <!-- ===== TREND CHART ===== -->
    ${visits.length>=2?`
    <div class="section">
      <div class="section-head">
        <div class="section-title">回本轨迹</div>
        <div class="section-badge">${done?'CLEARED':'IN PROGRESS'}</div>
      </div>
      <div class="section-body">
        <div class="chart-wrap">
          <canvas id="trendCanvas"></canvas>
          <div class="chart-tooltip"></div>
        </div>
        <div class="chart-legend">
          <span><i style="background:${done?'var(--green)':'var(--blue)'}"></i> 累计净值</span>
          <span><i style="background:rgba(0,0,0,.08);border:1px dashed rgba(0,0,0,.15)"></i> 目标 ¥${COST}</span>
          ${breakEvenIdx>=0?`<span><i style="background:var(--gold-bright)"></i> 回本点</span>`:''}
        </div>
      </div>
    </div>
    `:''}

    <!-- ===== VISIT BATTLE REPORTS (cards) ===== -->
    <div class="section">
      <div class="section-head">
        <div class="section-title">入园战报</div>
        <div class="section-badge">${visitCount} 次</div>
      </div>
      <div class="section-body">
        <div class="visit-cards" id="visitCards">
          ${visits.slice().reverse().map((v,ri)=>{
            const origIdx=visits.length-1-ri;
            const isBest=origIdx===bestIdx&&visitCount>1;
            const isWorst=origIdx===worstIdx&&visitCount>1&&worstNet<0;
            const total=v.saved+v.spent||1;
            const hidden=ri>=4;
            return`<div class="visit-card${isBest?' best-card':''}${isWorst?' worst-card':''}" ${hidden?'style="display:none" data-extra':''}>${isBest?'<div class="visit-card-sticker best">🏆 BEST</div>':''}${isWorst?'<div class="visit-card-sticker worst">💀 WORST</div>':''}
              <div class="visit-card-header">
                <div class="visit-card-left">
                  <div class="visit-card-idx">#${origIdx+1}</div>
                  <div class="visit-card-date">${fmtDate(v.date)}</div>
                </div>
                <div class="visit-card-net ${v.net>=0?'pos':'neg'}">${v.net>=0?'+':''}¥${v.net}</div>
              </div>
              <div class="visit-bar-track">
                <div class="visit-bar-seg sv" style="flex-grow:${v.saved/total}">+${v.saved}</div>
                ${v.spent>0?`<div class="visit-bar-seg sp" style="flex-grow:${v.spent/total}">-${v.spent}</div>`:''}
              </div>
            </div>`;
          }).join('')}
        </div>
        ${visitCount>4?`<div class="visit-toggle" id="visitToggle">展开全部 ${visitCount} 次 ▾</div>`:''}
      </div>
    </div>

    <!-- ===== SPENDING FLOW (bidirectional) ===== -->
    <div class="section">
      <div class="section-head">
        <div class="section-title">资金流向图谱</div>
      </div>
      <div class="section-body">
        ${cats.map(c=>{
          const isEarn=c.type==='🎢 入园';
          const val=isEarn?c.saved:c.spent;
          const icon=ICONS[c.type]||'📌';
          const label=c.type.replace(/^[^\s]+\s/,'');
          const barPct=Math.max(val/maxFlowVal*100,2);
          return`<div class="flow-item">
            <div class="flow-icon">${icon}</div>
            <div class="flow-name">${label}</div>
            <div class="flow-bar-wrap">
              <div class="flow-bar-left">
                ${!isEarn?`<div class="flow-bar spend" data-target="${barPct}" style="width:0%"></div>`:''}
              </div>
              <div class="flow-center"></div>
              <div class="flow-bar-right">
                ${isEarn?`<div class="flow-bar earn" data-target="${barPct}" style="width:0%"></div>`:''}
              </div>
            </div>
            <div class="flow-val" style="color:${isEarn?'var(--green)':'var(--red)'}">
              ${isEarn?'+':'−'}¥${val}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- ===== DETAIL LEDGER ===== -->
    <div class="section">
      <div class="section-head">
        <div class="section-title">消费明细</div>
        <div class="section-badge">${records.length} 条</div>
      </div>
      <div class="section-body">
        ${Object.entries(visitMap).sort((a,b)=>b[0].localeCompare(a[0])).map(([date,v],gi)=>{
          const dayNet=v.saved-v.spent;
          const isHidden=gi>=2;
          return`${gi>0?'<hr class="detail-perf">':''}
          <div class="detail-group${isHidden?' detail-hidden':''}">
            <div class="detail-date">
              <span class="detail-date-num">${String(gi+1).padStart(2,'0')}</span>
              ${fmtDate(date)}
              <span class="detail-date-net" style="color:${dayNet>=0?'var(--green)':'var(--red)'}">
                ${dayNet>=0?'+':''}¥${dayNet}
              </span>
            </div>
            ${v.items.map(i=>{
              const isE=i.type==='🎢 入园';
              const disp=isE?'+¥'+i.saved:(i.paid>0?'-¥'+i.paid:'¥0');
              const cls=isE&&i.saved>0?'pos':(i.paid>0?'neg':'z');
              return`<div class="detail-row">
                <div class="detail-left">
                  <span class="detail-icon">${ICONS[i.type]||'📌'}</span>
                  <span class="detail-name">${i.name}</span>
                </div>
                <span class="detail-val ${cls}">${disp}</span>
              </div>`;
            }).join('')}
          </div>`;
        }).join('')}
      </div>
      ${Object.keys(visitMap).length>2?`
      <div class="detail-toggle" id="detailToggle">
        <span>展开完整账本</span>
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>`:''}
    </div>

    <!-- ===== SEASON FOOTER ===== -->
    <div class="season-footer">
      <div class="season-footer-tag">SEASON 1 · ${seasonRange}</div>
      <div class="season-footer-quote">${commentary}</div>
      <div class="season-footer-source">数据来自 Notion · 自动更新 · ${updateStr}</div>
    </div>
  `;

  // ============================================
  // ANIMATIONS
  // ============================================

  // Hero percentage count-up
  const heroPctEl=document.getElementById('heroPct');
  if(heroPctEl){
    const displayPct=Math.min(pct,999);
    const start=performance.now();
    (function step(now){
      const p=Math.min((now-start)/1400,1);
      const ease=1-Math.pow(1-p,4);
      heroPctEl.childNodes[0].textContent=(ease*displayPct).toFixed(1);
      if(p<1)requestAnimationFrame(step);
    })(start);
  }

  // Net value count-up
  const netEl=document.getElementById('netVal');
  if(netEl)countUp(netEl,Math.abs(net),'','',1200);

  // Mini ticket count-ups
  const mtSaved=document.getElementById('mtSaved');
  if(mtSaved)countUp(mtSaved,entrySaved,'¥','',1000);
  const mtSpent=document.getElementById('mtSpent');
  if(mtSpent)countUp(mtSpent,parkSpend,'¥','',1000);
  const mtAvg=document.getElementById('mtAvg');
  if(mtAvg)countUp(mtAvg,Math.round(Math.abs(avgNet)),'¥','',1000);

  // Season progress track fill + node bounce
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const fill=document.getElementById('trackFill');
    if(fill)fill.style.width=Math.min(pct,120)+'%';

    const trackDuration=1800;
    const fillEnd=Math.min(pct,120);
    MILESTONES.forEach((m,i)=>{
      if(pct>=m.pct){
        const delay=(m.pct/fillEnd)*trackDuration;
        setTimeout(()=>{
          const node=document.getElementById('ms'+i);
          if(node)node.classList.add('bounce');
        },delay);
      }
    });
  }));

  // Trend chart
  if(visits.length>=2){
    const trendCanvas=document.getElementById('trendCanvas');
    if(trendCanvas){
      setTimeout(()=>drawTrendChart(trendCanvas,visits,done,bestIdx,worstIdx),300);
      let resizeTimer;
      window.addEventListener('resize',()=>{
        clearTimeout(resizeTimer);
        resizeTimer=setTimeout(()=>drawTrendChart(trendCanvas,visits,done,bestIdx,worstIdx),200);
      });
    }
  }

  // Flow bar animation
  setTimeout(()=>{
    document.querySelectorAll('.flow-bar[data-target]').forEach(el=>{
      el.style.width=el.dataset.target+'%';
    });
  },500);

  // Visit toggle
  const visitToggle=document.getElementById('visitToggle');
  if(visitToggle){
    let expanded=false;
    visitToggle.addEventListener('click',()=>{
      expanded=!expanded;
      document.querySelectorAll('[data-extra]').forEach(el=>{
        el.style.display=expanded?'block':'none';
      });
      visitToggle.textContent=expanded?'收起 ▴':`展开全部 ${visitCount} 次 ▾`;
    });
  }

  // Detail toggle
  const detailToggle=document.getElementById('detailToggle');
  if(detailToggle){
    detailToggle.addEventListener('click',()=>{
      const hidden=document.querySelectorAll('.detail-hidden');
      const isOpen=detailToggle.classList.toggle('open');
      hidden.forEach(el=>el.classList.toggle('show',isOpen));
      detailToggle.querySelector('span').textContent=isOpen?'收起账本':'展开完整账本';
    });
  }

  // Confetti
  if(done)setTimeout(confetti,800);
}

const DATA=[{"name": "餐饮", "date": "2026-02-08", "type": "🍔 餐饮", "original": 40, "paid": 40, "saved": 0}, {"name": "功夫熊猫吊杠", "date": "2026-02-08", "type": "🎪 活动/福利", "original": 40, "paid": 40, "saved": 0}, {"name": "停车", "date": "2026-02-08", "type": "🅿️ 停车", "original": 50, "paid": 50, "saved": 0}, {"name": "入园", "date": "2026-02-08", "type": "🎢 入园", "original": 300, "paid": 0, "saved": 300}];
render(DATA);
</script>
</body>
