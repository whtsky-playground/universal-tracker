<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>环球影城 · 回本战绩</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&family=ZCOOL+KuaiLe&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#0a0a0f;
  --card-bg:#12121a;
  --card-bg2:#1a1a24;
  --text:#fff;
  --text2:rgba(255,255,255,.65);
  --text3:rgba(255,255,255,.4);
  --accent:#ff6b35;
  --accent2:#f7c94b;
  --accent3:#4ecdc4;
  --success:#2ecc71;
  --danger:#e74c3c;
  --gradient1:linear-gradient(135deg,#ff6b35,#f7c94b);
  --gradient2:linear-gradient(135deg,#4ecdc4,#45b7d1);
  --gradient3:linear-gradient(135deg,#a855f7,#ec4899);
  --glow:0 0 40px;
  --font-display:'Outfit',sans-serif;
  --font-mono:'Space Mono',monospace;
  --font-zan:'ZCOOL KuaiLe',sans-serif;
}

html{scroll-behavior:smooth}
body{
  font-family:var(--font-display);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  min-height:100dvh;
  overflow-x:hidden;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

/* Animated gradient background */
body::before{
  content:'';
  position:fixed;
  inset:0;
  z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% -10%,rgba(255,107,53,.12),transparent),
    radial-gradient(ellipse 60% 40% at 80% 100%,rgba(168,85,247,.1),transparent),
    radial-gradient(ellipse 50% 30% at 50% 50%,rgba(78,205,196,.06),transparent);
  animation:bgPulse 8s ease-in-out infinite alternate;
}

@keyframes bgPulse{
  0%{opacity:.8}
  100%{opacity:1}
}

.container{
  max-width:440px;
  margin:0 auto;
  padding:16px 12px 100px;
  position:relative;
  z-index:2;
}

/* === HERO CARD (main shareable card) === */
.hero-card{
  position:relative;
  background:linear-gradient(165deg,var(--card-bg),var(--card-bg2));
  border-radius:28px;
  padding:28px 24px 24px;
  margin-bottom:16px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 20px 60px rgba(0,0,0,.4);
}

/* Animated border glow */
.hero-card::before{
  content:'';
  position:absolute;
  inset:-2px;
  border-radius:30px;
  background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3),var(--accent));
  background-size:300% 300%;
  animation:borderFlow 4s linear infinite;
  z-index:-1;
  opacity:.5;
}

@keyframes borderFlow{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.hero-card::after{
  content:'';
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:conic-gradient(from 0deg,transparent,rgba(255,107,53,.03),transparent 30%);
  animation:rotateGlow 12s linear infinite;
}

@keyframes rotateGlow{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

/* Header */
.card-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
}

.card-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 12px;
  background:rgba(255,255,255,.06);
  border-radius:100px;
  font-size:11px;
  font-weight:600;
  color:var(--text2);
  letter-spacing:.5px;
}

.card-badge .dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--success);
  animation:pulseDot 2s ease-in-out infinite;
}

@keyframes pulseDot{
  0%,100%{opacity:.5;transform:scale(1)}
  50%{opacity:1;transform:scale(1.3)}
}

.card-logo{
  font-family:var(--font-zan);
  font-size:14px;
  color:var(--text3);
}

/* Main number display */
.main-display{
  text-align:center;
  margin-bottom:24px;
}

.main-label{
  font-size:12px;
  color:var(--text3);
  font-weight:500;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:8px;
}

.main-number{
  font-size:82px;
  font-weight:800;
  line-height:.95;
  background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,.7) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  position:relative;
  display:inline-block;
}

.main-number::after{
  content:'%';
  font-size:32px;
  font-weight:600;
  opacity:.6;
  margin-left:2px;
}

.main-sub{
  font-size:14px;
  color:var(--text2);
  margin-top:8px;
  font-weight:500;
}

/* Progress ring */
.progress-ring-wrap{
  display:flex;
  justify-content:center;
  margin-bottom:24px;
}

.progress-ring{
  position:relative;
  width:140px;
  height:140px;
}

.progress-ring svg{
  transform:rotate(-90deg);
  width:100%;
  height:100%;
}

.progress-ring circle{
  fill:none;
  stroke-width:8;
  stroke-linecap:round;
}

.progress-ring .bg{
  stroke:rgba(255,255,255,.08);
}

.progress-ring .fg{
  stroke:url(#ringGradient);
  stroke-dasharray:408;
  stroke-dashoffset:408;
  transition:stroke-dashoffset 1.8s cubic-bezier(.16,1,.3,1);
  filter:drop-shadow(0 0 8px rgba(255,107,53,.4));
}

.progress-ring .center-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.progress-ring .ring-value{
  font-size:36px;
  font-weight:700;
}

.progress-ring .ring-value::after{
  content:'%';
  font-size:16px;
  opacity:.5;
}

.progress-ring .ring-label{
  font-size:10px;
  color:var(--text3);
  margin-top:2px;
}

/* Stats grid */
.stats-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.stat-item{
  background:rgba(255,255,255,.04);
  border-radius:16px;
  padding:16px 12px;
  text-align:center;
  border:1px solid rgba(255,255,255,.04);
}

.stat-item .icon{
  font-size:20px;
  margin-bottom:6px;
}

.stat-item .value{
  font-family:var(--font-mono);
  font-size:20px;
  font-weight:700;
  margin-bottom:2px;
}

.stat-item .label{
  font-size:10px;
  color:var(--text3);
}

/* Status message */
.status-msg{
  margin-top:20px;
  padding:14px 18px;
  border-radius:16px;
  display:flex;
  align-items:center;
  gap:12px;
}

.status-msg.success{
  background:rgba(46,204,113,.12);
  border:1px solid rgba(46,204,113,.2);
}

.status-msg.warning{
  background:rgba(247,201,75,.12);
  border:1px solid rgba(247,201,75,.2);
}

.status-msg .emoji{
  font-size:24px;
}

.status-msg .text{
  font-size:13px;
  font-weight:500;
  line-height:1.4;
}

.status-msg .text strong{
  font-family:var(--font-mono);
}

/* === DAILY HIGHLIGHTS === */
.highlights{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding-bottom:8px;
  margin-bottom:16px;
  scrollbar-width:none;
}

.highlights::-webkit-scrollbar{display:none}

.highlight-card{
  flex-shrink:0;
  width:140px;
  background:linear-gradient(165deg,var(--card-bg),var(--card-bg2));
  border-radius:18px;
  padding:16px;
  border:1px solid rgba(255,255,255,.06);
}

.highlight-card.best{
  border-color:rgba(46,204,113,.3);
  background:linear-gradient(165deg,rgba(46,204,113,.08),var(--card-bg2));
}

.highlight-card.latest{
  border-color:rgba(255,107,53,.3);
  background:linear-gradient(165deg,rgba(255,107,53,.08),var(--card-bg2));
}

.highlight-card .date{
  font-size:11px;
  color:var(--text3);
  margin-bottom:8px;
}

.highlight-card .net{
  font-family:var(--font-mono);
  font-size:22px;
  font-weight:700;
}

.highlight-card .type{
  font-size:10px;
  color:var(--text2);
  margin-top:4px;
}

.highlight-card.best .net{color:var(--success)}
.highlight-card.latest .net{color:var(--accent)}

/* === BREAKDOWN === */
.breakdown-card{
  background:linear-gradient(165deg,var(--card-bg),var(--card-bg2));
  border-radius:22px;
  padding:20px;
  margin-bottom:16px;
  border:1px solid rgba(255,255,255,.06);
}

.breakdown-title{
  font-size:14px;
  font-weight:700;
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:8px;
}

.breakdown-title .icon{font-size:18px}

.breakdown-items{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.breakdown-item{
  display:flex;
  align-items:center;
  gap:12px;
}

.breakdown-icon{
  width:36px;
  height:36px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  flex-shrink:0;
}

.breakdown-info{
  flex:1;
  min-width:0;
}

.breakdown-name{
  font-size:12px;
  font-weight:600;
  margin-bottom:4px;
}

.breakdown-bar{
  height:4px;
  border-radius:2px;
  background:rgba(255,255,255,.08);
  overflow:hidden;
}

.breakdown-fill{
  height:100%;
  border-radius:2px;
  transition:width 1.2s cubic-bezier(.16,1,.3,1);
}

.breakdown-value{
  font-family:var(--font-mono);
  font-size:14px;
  font-weight:700;
  flex-shrink:0;
  width:60px;
  text-align:right;
}

/* === QUOTE CARD === */
.quote-card{
  background:linear-gradient(165deg,rgba(255,107,53,.08),var(--card-bg2));
  border-radius:22px;
  padding:24px;
  margin-bottom:16px;
  border:1px solid rgba(255,107,53,.15);
  text-align:center;
}

.quote-emoji{
  font-size:32px;
  margin-bottom:12px;
  animation:bounce 2s ease-in-out infinite;
}

@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

.quote-text{
  font-size:18px;
  font-weight:700;
  line-height:1.5;
  margin-bottom:8px;
}

.quote-sub{
  font-size:12px;
  color:var(--text3);
}

/* === FOOTER === */
.footer{
  text-align:center;
  padding:24px 0 12px;
  font-size:10px;
  color:var(--text3);
  opacity:.6;
}

/* === CONFETTI === */
.confetti-container{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:99;
  overflow:hidden;
}

.confetti-piece{
  position:absolute;
  width:10px;
  height:10px;
  animation:confettiFall 3s cubic-bezier(.25,.46,.45,.94) forwards;
}

@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}

/* === LOADING === */
.loading{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:60vh;
  gap:16px;
}

.loading-spinner{
  width:40px;
  height:40px;
  border:3px solid rgba(255,255,255,.1);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg)}}

.loading-text{
  font-size:12px;
  color:var(--text3);
  letter-spacing:2px;
}

/* Scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

@media (prefers-reduced-motion:reduce){
  *{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
}

@media (min-width:520px){
  .container{padding:32px 16px 100px}
}
</style>
</head>
<body>

<svg style="position:absolute;width:0;height:0">
  <defs>
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="50%" stop-color="#f7c94b"/>
      <stop offset="100%" stop-color="#4ecdc4"/>
    </linearGradient>
  </defs>
</svg>

<div class="container" id="app">
  <div class="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">LOADING</div>
  </div>
</div>

<script>
const COST=1688,NAME='悠享年卡';

const ICONS={
  '🎢 入园':'🎢','🍔 餐饮':'🍔','🎁 商品折扣':'🎁',
  '🅿️ 停车':'🅿️','🎪 活动/福利':'🎪','🏨 酒店折扣':'🏨'
};

const CAT_COLORS={
  '🎢 入园':'#2ecc71','🍔 餐饮':'#f39c12','🎁 商品折扣':'#e91e63',
  '🅿️ 停车':'#3498db','🎪 活动/福利':'#9b59b6','🏨 酒店折扣':'#1abc9c'
};

const QUOTES={
  great:['🎉 回本达成！你就是省钱之神！','🏆 今日成就：成功白嫖！','💰 这波啊，这波是纯赚！'],
  good:['🔥 越来越接近目标了！','⭐ 保持这个势头，回本指日可待！','✨ 每一次入园都是进步！'],
  normal:['📈 稳扎稳打，积少成多！','🌟 继续加油，回本在前方等你！','💪 积累的力量是伟大的！'],
  bad:['😅 革命尚未成功，同志仍需努力！','🎯 调整策略，下一次会更好！','🌱 每一笔消费都是成长！']
};

function fmtDate(d){
  const dt=new Date(d+'T00:00:00');
  const w=['日','一','二','三','四','五','六'];
  return`${dt.getMonth()+1}.${dt.getDate()}`;
}

function fmtMoney(v){
  return(v>=0?'+¥':'−¥')+Math.abs(Math.round(v));
}

function fmtMoneyPlain(v){
  return(v<0?'−':'+')+'¥'+Math.abs(Math.round(v));
}

function countUp(el,target,prefix='',suffix='',duration=1200){
  const start=performance.now();
  (function step(now){
    const p=Math.min((now-start)/duration,1);
    const ease=1-Math.pow(1-p,4);
    el.textContent=prefix+Math.round(ease*target)+suffix;
    if(p<1)requestAnimationFrame(step);
  })(start);
}

function countUpFloat(el,target,prefix='',suffix='',duration=1200){
  const start=performance.now();
  (function step(now){
    const p=Math.min((now-start)/duration,1);
    const ease=1-Math.pow(1-p,4);
    el.textContent=prefix+(ease*target).toFixed(1)+suffix;
    if(p<1)requestAnimationFrame(step);
  })(start);
}

function confetti(){
  const container=document.createElement('div');
  container.className='confetti-container';
  const colors=['#ff6b35','#f7c94b','#4ecdc4','#2ecc71','#e91e63','#3498db'];
  for(let i=0;i<60;i++){
    const piece=document.createElement('div');
    piece.className='confetti-piece';
    const size=4+Math.random()*8;
    const isCircle=Math.random()>.6;
    piece.style.cssText=`
      left:${Math.random()*100}%;
      width:${size}px;height:${isCircle?size:size*2}px;
      background:${colors[~~(Math.random()*colors.length)]};
      border-radius:${isCircle?'50%':'2px'};
      animation-delay:${Math.random()*1.5}s;
      animation-duration:${2+Math.random()*1.5}s;
    `;
    container.appendChild(piece);
  }
  document.body.appendChild(container);
  setTimeout(()=>container.remove(),4500);
}

function render(records){
  const entrySaved=records.filter(r=>r.type==='🎢 入园').reduce((s,r)=>s+r.saved,0);
  const parkSpend=records.filter(r=>r.type!=='🎢 入园').reduce((s,r)=>s+r.paid,0);
  const net=entrySaved-parkSpend;
  const pct=Math.min(Math.max(net/COST*100,0),999);
  const done=net>=COST;
  const remaining=Math.max(COST-net,0);
  const surplus=Math.max(net-COST,0);

  const visitMap={};
  records.forEach(r=>{
    if(!visitMap[r.date])visitMap[r.date]={date:r.date,saved:0,spent:0,items:[]};
    if(r.type==='🎢 入园')visitMap[r.date].saved+=r.saved;
    else visitMap[r.date].spent+=r.paid;
    visitMap[r.date].items.push(r);
  });
  const visits=Object.values(visitMap).sort((a,b)=>a.date.localeCompare(b.date));
  let cum=0;
  visits.forEach(v=>{cum+=v.saved-v.spent;v.cumNet=cum;v.net=v.saved-v.spent});
  const visitCount=visits.length;
  const avgNet=visitCount>0?net/visitCount:0;
  const needMore=avgNet>0?Math.ceil(remaining/avgNet):'∞';

  let bestVisit=null,worstVisit=null;
  let bestNet=-Infinity,worstNet=Infinity;
  visits.forEach(v=>{
    if(v.net>bestNet){bestNet=v.net;bestVisit=v}
    if(v.net<worstNet){worstNet=v.net;worstVisit=v}
  });

  const catMap={};
  records.forEach(r=>{
    const key=r.type;
    if(!catMap[key])catMap[key]={type:key,saved:0,spent:0,count:0};
    catMap[key].saved+=r.saved;catMap[key].spent+=r.paid;catMap[key].count++;
  });
  const cats=Object.values(catMap).sort((a,b)=>(b.saved+b.spent)-(a.saved+a.spent));
  const maxCatVal=Math.max(...cats.map(c=>c.saved+c.spent));

  const quoteKey=done?'great':(pct>=60?'good':(pct>=30?'normal':'bad'));
  const quote=QUOTES[quoteKey][Math.floor(Math.random()*QUOTES[quoteKey.length])];

  const now=new Date();
  const updateStr=`${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;

  const app=document.getElementById('app');
  app.innerHTML=`
    <!-- ===== HERO CARD ===== -->
    <div class="hero-card">
      <div class="card-header">
        <div class="card-badge">
          <span class="dot"></span>
          ${done?'已回本':'进行中'}
        </div>
        <div class="card-logo">🎢 ${NAME}</div>
      </div>

      <div class="main-display">
        <div class="main-label">${done?'超额回本率':'回本进度'}</div>
        <div class="main-number" id="mainPct">0</div>
        <div class="main-sub" id="mainSub">累计净值 ¥${net}</div>
      </div>

      <div class="progress-ring-wrap">
        <div class="progress-ring">
          <svg viewBox="0 0 140 140">
            <circle class="bg" cx="70" cy="70" r="65"/>
            <circle class="fg" id="ringFg" cx="70" cy="70" r="65"/>
          </svg>
          <div class="center-text">
            <div class="ring-value" id="ringValue">0</div>
            <div class="ring-label">完成度</div>
          </div>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-item">
          <div class="icon">🎫</div>
          <div class="value" style="color:var(--success)" id="statSaved">¥0</div>
          <div class="label">门票节省</div>
        </div>
        <div class="stat-item">
          <div class="icon">🛒</div>
          <div class="value" style="color:var(--danger)" id="statSpent">¥0</div>
          <div class="label">园内消费</div>
        </div>
        <div class="stat-item">
          <div class="icon">🚪</div>
          <div class="value" style="color:var(--accent)">${visitCount}</div>
          <div class="label">入园次数</div>
        </div>
      </div>

      <div class="status-msg ${done?'success':'warning'}">
        <div class="emoji">${done?'🎉':'🔥'}</div>
        <div class="text">
          ${done
            ?`已在第 <strong>${visitCount}</strong> 次入园回本，之后每次都在赚！`
            :`还差 <strong>¥${remaining}</strong> 回本，预计再需 <strong>${needMore}</strong> 次`
          }
        </div>
      </div>
    </div>

    <!-- ===== DAILY HIGHLIGHTS ===== -->
    ${visits.length>0?`
    <div class="highlights">
      ${bestVisit&&bestNet>0?`
      <div class="highlight-card best">
        <div class="date">${fmtDate(bestVisit.date)}</div>
        <div class="net">${fmtMoney(bestVisit.net)}</div>
        <div class="type">最佳单日</div>
      </div>
      `:''}
      <div class="highlight-card latest">
        <div class="date">${fmtDate(visits[visits.length-1].date)}</div>
        <div class="net">${fmtMoney(visits[visits.length-1].net)}</div>
        <div class="type">最近入园</div>
      </div>
      ${visits.length>1?`
      <div class="highlight-card">
        <div class="date">${visitCount} 次</div>
        <div class="net" style="color:var(--accent3)">¥${Math.round(avgNet)}</div>
        <div class="type">场均净值</div>
      </div>
      `:''}
    </div>
    `:''}

    <!-- ===== QUOTE CARD ===== -->
    <div class="quote-card">
      <div class="quote-emoji">${done?'🏆':'💬'}</div>
      <div class="quote-text">${quote}</div>
      <div class="quote-sub">第 ${visitCount} 次入园 · 更新于 ${updateStr}</div>
    </div>

    <!-- ===== BREAKDOWN ===== -->
    <div class="breakdown-card">
      <div class="breakdown-title">
        <span class="icon">📊</span>
        消费分布
      </div>
      <div class="breakdown-items">
        ${cats.map(c=>{
          const val=c.type==='🎢 入园'?c.saved:c.spent;
          const color=CAT_COLORS[c.type]||'#666';
          const icon=ICONS[c.type]||'📌';
          const label=c.type.replace(/^[^\s]+\s/,'');
          const isSave=c.type==='🎢 入园';
          return`<div class="breakdown-item">
            <div class="breakdown-icon" style="background:${color}20;color:${color}">${icon}</div>
            <div class="breakdown-info">
              <div class="breakdown-name">${label} <span style="opacity:.5;font-size:10px">×${c.count}</span></div>
              <div class="breakdown-bar">
                <div class="breakdown-fill" style="width:0%;background:${color}" data-target="${val/maxCatVal*100}"></div>
              </div>
            </div>
            <div class="breakdown-value" style="color:${isSave?'var(--success)':'var(--danger)'}">
              ${isSave?'+':'−'}¥${val}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="footer">
      累计已节省 ¥${entrySaved} · 园内消费 ¥${parkSpend} · 数据来自 Notion
    </div>
  `;

  // Animations
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    // Ring progress
    const ringFg=document.getElementById('ringFg');
    if(ringFg){
      const targetOffset=408-(408*Math.min(pct,100)/100);
      setTimeout(()=>{ringFg.style.strokeDashoffset=targetOffset},100);
    }

    // Breakdown bars
    document.querySelectorAll('.breakdown-fill').forEach(el=>{
      setTimeout(()=>{el.style.width=el.dataset.target+'%'},300);
    });
  }));

  // Number animations
  const mainPct=document.getElementById('mainPct');
  if(mainPct){
    const start=performance.now();
    const target=Math.min(pct,999);
    (function step(now){
      const p=Math.min((now-start)/1500,1);
      const ease=1-Math.pow(1-p,4);
      mainPct.childNodes[0]?mainPct.childNodes[0].textContent=(ease*target).toFixed(1):mainPct.textContent=(ease*target).toFixed(1);
      if(p<1)requestAnimationFrame(step);
    })(start);
  }

  const mainSub=document.getElementById('mainSub');
  if(mainSub){
    const start=performance.now();
    (function step(now){
      const p=Math.min((now-start)/1200,1);
      const ease=1-Math.pow(1-p,4);
      const val=Math.round(ease*net);
      mainSub.textContent=`累计净值 ${val>=0?'+':'−'}¥${Math.abs(val)}`;
      if(p<1)requestAnimationFrame(step);
    })(start);
  }

  const ringValue=document.getElementById('ringValue');
  if(ringValue)countUpFloat(ringValue,Math.min(pct,100),'','',1500);

  const savedEl=document.getElementById('statSaved');
  if(savedEl)countUp(savedEl,entrySaved,'¥','',1000);

  const spentEl=document.getElementById('statSpent');
  if(spentEl)countUp(spentEl,parkSpend,'¥','',1000);

  if(done)setTimeout(confetti,800);
}

render(DATA);
</script>
