<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>环球影城 · 冒险者档案</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#0f0e17;
  --bg2:#1a1932;
  --bg3:#232146;
  --surface:rgba(255,255,255,0.04);
  --surface2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.06);
  --text:#fffffe;
  --text2:rgba(255,255,255,0.7);
  --text3:rgba(255,255,255,0.4);
  --xp:#f9d342;
  --xp-glow:rgba(249,211,66,0.3);
  --hp:#ff6b6b;
  --mp:#7b68ee;
  --gold:#f9d342;
  --green:#2de370;
  --green-glow:rgba(45,227,112,0.25);
  --red:#ff6b6b;
  --blue:#4cc9f0;
  --purple:#b388ff;
  --font-pixel:'Press Start 2P',monospace;
  --font-body:'Noto Sans SC',-apple-system,system-ui,sans-serif;
  --font-mono:'JetBrains Mono','Noto Sans SC',monospace;
}

html{scroll-behavior:smooth}
body{
  font-family:var(--font-body);
  background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

/* Starfield background */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(1px 1px at 10% 20%,rgba(255,255,255,0.4),transparent),
    radial-gradient(1px 1px at 30% 65%,rgba(255,255,255,0.3),transparent),
    radial-gradient(1px 1px at 50% 10%,rgba(255,255,255,0.5),transparent),
    radial-gradient(1px 1px at 70% 40%,rgba(255,255,255,0.25),transparent),
    radial-gradient(1px 1px at 90% 80%,rgba(255,255,255,0.35),transparent),
    radial-gradient(1.5px 1.5px at 15% 85%,rgba(249,211,66,0.4),transparent),
    radial-gradient(1.5px 1.5px at 85% 15%,rgba(123,104,238,0.4),transparent),
    radial-gradient(1px 1px at 25% 45%,rgba(255,255,255,0.2),transparent),
    radial-gradient(1px 1px at 60% 75%,rgba(255,255,255,0.3),transparent),
    radial-gradient(1px 1px at 45% 55%,rgba(255,255,255,0.15),transparent),
    radial-gradient(1px 1px at 80% 60%,rgba(255,255,255,0.25),transparent),
    radial-gradient(1px 1px at 5% 50%,rgba(255,255,255,0.3),transparent);
}

/* Scanline overlay */
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.03;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.5) 2px,rgba(255,255,255,0.5) 3px);
}

.container{
  max-width:440px;margin:0 auto;padding:16px 12px 80px;
  position:relative;z-index:2;
}

/* === CHARACTER CARD (HERO) === */
.char-card{
  position:relative;
  background:linear-gradient(145deg,var(--bg2),var(--bg3));
  border:1px solid var(--border);
  border-radius:16px;
  padding:24px 20px 20px;
  margin-bottom:16px;
  overflow:hidden;
}
/* Corner decorations */
.char-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--xp),var(--green),var(--blue),var(--purple));
  border-radius:16px 16px 0 0;
}
.char-card::after{
  content:'';position:absolute;top:-60px;right:-60px;width:180px;height:180px;
  background:radial-gradient(circle,rgba(249,211,66,0.06),transparent 70%);
  pointer-events:none;
}

/* Class badge */
.char-class{
  display:inline-flex;align-items:center;gap:6px;
  font-family:var(--font-pixel);font-size:8px;
  color:var(--xp);letter-spacing:1px;
  background:rgba(249,211,66,0.1);
  border:1px solid rgba(249,211,66,0.2);
  padding:5px 10px;border-radius:6px;
  margin-bottom:14px;
}

.char-name{
  font-size:20px;font-weight:900;
  margin-bottom:2px;
  background:linear-gradient(135deg,#fff,rgba(255,255,255,0.8));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.char-subtitle{
  font-family:var(--font-mono);font-size:10px;color:var(--text3);
  letter-spacing:.5px;margin-bottom:20px;
}

/* Level display */
.level-wrap{
  display:flex;align-items:center;gap:14px;
  margin-bottom:16px;
}
.level-badge{
  width:56px;height:56px;
  border-radius:14px;
  background:linear-gradient(135deg,rgba(249,211,66,0.15),rgba(249,211,66,0.05));
  border:2px solid rgba(249,211,66,0.3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex-shrink:0;position:relative;
}
.level-badge::after{
  content:'';position:absolute;inset:-1px;border-radius:14px;
  box-shadow:0 0 20px rgba(249,211,66,0.15);
  pointer-events:none;
}
.level-label{
  font-family:var(--font-pixel);font-size:6px;
  color:var(--xp);opacity:.7;margin-bottom:2px;
}
.level-num{
  font-family:var(--font-pixel);font-size:20px;
  color:var(--xp);line-height:1;
}
.level-info{flex:1;min-width:0}
.level-title{
  font-size:13px;font-weight:700;color:var(--text);
  margin-bottom:6px;
}

/* XP bar */
.xp-bar-wrap{margin-bottom:4px}
.xp-bar-label{
  display:flex;justify-content:space-between;
  font-family:var(--font-mono);font-size:9px;color:var(--text3);
  margin-bottom:4px;
}
.xp-bar{
  height:10px;border-radius:5px;
  background:rgba(255,255,255,0.06);
  position:relative;overflow:hidden;
  border:1px solid rgba(255,255,255,0.04);
}
.xp-bar-fill{
  height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--xp),#ffe066);
  box-shadow:0 0 12px var(--xp-glow);
  transition:width 2s cubic-bezier(.16,1,.3,1);
  width:0%;
  position:relative;
}
.xp-bar-fill::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,0.3),transparent 50%);
  border-radius:4px;
}
/* Animated shimmer on XP bar */
.xp-bar-fill::before{
  content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
  animation:shimmer 2s ease-in-out infinite;
}
@keyframes shimmer{
  0%{left:-50%}
  100%{left:150%}
}

/* Stat bars (HP / MP style) */
.stat-bars{display:flex;gap:8px;margin-bottom:16px}
.stat-bar-item{flex:1}
.stat-bar-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:4px;
}
.stat-bar-tag{
  font-family:var(--font-pixel);font-size:6px;
  padding:2px 5px;border-radius:3px;
}
.stat-bar-tag.save{background:rgba(45,227,112,0.15);color:var(--green)}
.stat-bar-tag.spend{background:rgba(255,107,107,0.15);color:var(--red)}
.stat-bar-val{font-family:var(--font-mono);font-size:11px;font-weight:700}
.stat-bar-val.save{color:var(--green)}
.stat-bar-val.spend{color:var(--red)}
.stat-bar-track{
  height:6px;border-radius:3px;
  background:rgba(255,255,255,0.06);
  overflow:hidden;
}
.stat-bar-fill{
  height:100%;border-radius:3px;
  transition:width 1.5s cubic-bezier(.16,1,.3,1);
  width:0%;
}
.stat-bar-fill.save{background:linear-gradient(90deg,#1aa855,var(--green));box-shadow:0 0 8px var(--green-glow)}
.stat-bar-fill.spend{background:linear-gradient(90deg,#cc4444,var(--red));box-shadow:0 0 8px rgba(255,107,107,0.2)}

/* Quick stats row */
.quick-stats{
  display:grid;grid-template-columns:repeat(3,1fr);gap:6px;
}
.q-stat{
  text-align:center;padding:10px 6px;
  background:var(--surface);border-radius:10px;
  border:1px solid var(--border);
}
.q-stat-val{
  font-family:var(--font-mono);font-size:18px;font-weight:700;
  margin-bottom:2px;
}
.q-stat-lbl{font-size:9px;color:var(--text3);font-weight:500}

/* === STATUS EFFECT BADGE === */
.status-effect{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:100px;
  font-family:var(--font-mono);font-size:11px;font-weight:600;
  margin-top:12px;
}
.status-effect.buff{
  background:rgba(45,227,112,0.1);border:1px solid rgba(45,227,112,0.2);
  color:var(--green);
}
.status-effect.debuff{
  background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.2);
  color:var(--red);
}
.status-effect.neutral{
  background:rgba(249,211,66,0.1);border:1px solid rgba(249,211,66,0.2);
  color:var(--xp);
}
.status-pulse{
  width:6px;height:6px;border-radius:50%;
  animation:pulse 2s ease-in-out infinite;
}
.status-pulse.green{background:var(--green)}
.status-pulse.red{background:var(--red)}
.status-pulse.gold{background:var(--xp)}
@keyframes pulse{
  0%,100%{opacity:.5;transform:scale(1)}
  50%{opacity:1;transform:scale(1.3)}
}

/* === QUEST LOG === */
.section{
  background:linear-gradient(145deg,var(--bg2),var(--bg3));
  border:1px solid var(--border);
  border-radius:14px;
  margin-bottom:14px;
  overflow:hidden;
}
.section-head{
  padding:14px 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.section-title{
  font-size:12px;font-weight:700;color:var(--text);
  display:flex;align-items:center;gap:6px;
}
.section-title .pixel-icon{
  font-family:var(--font-pixel);font-size:8px;
}
.section-badge{
  font-family:var(--font-mono);font-size:9px;font-weight:600;
  padding:3px 8px;border-radius:100px;
  background:var(--surface2);color:var(--text3);
}
.section-body{padding:12px 16px 16px}

/* Quest (visit) items */
.quest{
  padding:12px;margin-bottom:8px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  position:relative;
}
.quest:last-child{margin-bottom:0}
.quest.legendary{
  border-color:rgba(249,211,66,0.25);
  background:linear-gradient(135deg,rgba(249,211,66,0.06),transparent);
}
.quest.failed{
  border-color:rgba(255,107,107,0.2);
  background:linear-gradient(135deg,rgba(255,107,107,0.04),transparent);
}
.quest-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:8px;
}
.quest-title{display:flex;align-items:center;gap:6px}
.quest-num{
  font-family:var(--font-pixel);font-size:7px;
  color:var(--text3);background:var(--surface2);
  padding:3px 6px;border-radius:4px;
}
.quest-date{font-size:11px;font-weight:600;color:var(--text2)}
.quest-reward{
  font-family:var(--font-mono);font-size:13px;font-weight:700;
}
.quest-reward.pos{color:var(--green)}
.quest-reward.neg{color:var(--red)}
.quest-rarity{
  font-family:var(--font-pixel);font-size:6px;
  padding:2px 6px;border-radius:3px;
  margin-left:6px;
}
.quest-rarity.legendary{background:rgba(249,211,66,0.2);color:var(--xp)}
.quest-rarity.failed{background:rgba(255,107,107,0.15);color:var(--red)}

/* Quest loot bar */
.loot-bar{
  height:20px;border-radius:5px;display:flex;gap:2px;
  overflow:hidden;background:rgba(255,255,255,0.03);
}
.loot-seg{
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:700;font-family:var(--font-mono);
  color:#fff;border-radius:4px;min-width:24px;
  transition:flex-grow 1s cubic-bezier(.16,1,.3,1);
}
.loot-seg.gold{background:linear-gradient(135deg,#1aa855,var(--green))}
.loot-seg.loss{background:linear-gradient(135deg,#cc4444,var(--red))}

/* === SKILL TREE (categories) === */
.skill-tree{display:flex;flex-direction:column;gap:10px}
.skill-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
}
.skill-icon{
  font-size:18px;width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  background:var(--surface2);border-radius:8px;flex-shrink:0;
}
.skill-info{flex:1;min-width:0}
.skill-name{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px}
.skill-bar{
  height:4px;border-radius:2px;
  background:rgba(255,255,255,0.06);overflow:hidden;
}
.skill-bar-fill{
  height:100%;border-radius:2px;
  transition:width 1.2s cubic-bezier(.16,1,.3,1);
  width:0%;
}
.skill-val{
  font-family:var(--font-mono);font-size:11px;font-weight:700;
  flex-shrink:0;width:56px;text-align:right;
}

/* === ADVENTURE MAP (timeline) === */
.map-wrap{
  position:relative;
  padding:8px 0 8px 28px;
}
.map-line{
  position:absolute;left:11px;top:0;bottom:0;
  width:2px;
  background:linear-gradient(180deg,var(--xp),var(--green),var(--blue),var(--purple),var(--border));
}
.map-node{
  position:relative;
  padding:8px 0 8px 16px;
}
.map-dot{
  position:absolute;left:-22px;top:11px;
  width:12px;height:12px;border-radius:50%;
  background:var(--bg2);
  border:2px solid var(--text3);
  z-index:1;
}
.map-node:first-child .map-dot{border-color:var(--xp);box-shadow:0 0 8px var(--xp-glow)}
.map-node.checkpoint .map-dot{
  border-color:var(--green);background:var(--green);
  box-shadow:0 0 10px var(--green-glow);
}
.map-date{
  font-family:var(--font-mono);font-size:9px;
  color:var(--text3);margin-bottom:2px;
}
.map-desc{font-size:11px;color:var(--text2);font-weight:500}
.map-loot{
  font-family:var(--font-mono);font-size:10px;font-weight:700;
  margin-top:2px;
}

/* === PREDICTION === */
.predict{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;
  background:linear-gradient(145deg,var(--bg2),var(--bg3));
  border:1px solid var(--border);
  border-radius:14px;
  margin-bottom:14px;
}
.predict-icon{
  width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
  background:var(--surface2);
}
.predict-text{font-size:12px;font-weight:500;color:var(--text2);line-height:1.6}
.predict-text strong{
  font-family:var(--font-mono);color:var(--text);font-weight:700;
}

/* === COLLAPSIBLE === */
.detail-toggle{
  display:flex;align-items:center;justify-content:center;
  padding:10px;cursor:pointer;gap:4px;
  font-size:11px;color:var(--text3);font-weight:500;
  border-top:1px solid var(--border);transition:color .2s;
}
.detail-toggle:hover{color:var(--text2)}
.detail-toggle svg{transition:transform .3s}
.detail-toggle.open svg{transform:rotate(180deg)}
.detail-hidden{display:none}
.detail-hidden.show{display:block}

/* === FOOTER === */
.footer{
  text-align:center;padding:24px 0 12px;
  font-family:var(--font-pixel);
  font-size:6px;color:var(--text3);opacity:.5;
  letter-spacing:1px;line-height:2;
}

/* === LEVEL UP FLASH === */
.levelup-overlay{
  position:fixed;inset:0;z-index:100;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .3s;
}
.levelup-overlay.show{opacity:1}
.levelup-flash{
  position:absolute;inset:0;
  background:radial-gradient(circle,rgba(249,211,66,0.15),transparent 70%);
}
.levelup-text{
  font-family:var(--font-pixel);font-size:14px;
  color:var(--xp);text-shadow:0 0 30px var(--xp-glow);
  animation:lvlBounce .6s cubic-bezier(.68,-.55,.265,1.55);
  text-align:center;line-height:2.5;
}
@keyframes lvlBounce{
  0%{transform:scale(0);opacity:0}
  60%{transform:scale(1.2)}
  100%{transform:scale(1);opacity:1}
}

/* === PARTICLES === */
.particles{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden}
.particle{
  position:absolute;border-radius:50%;
  animation:particleFloat 3s ease-out forwards;
}
@keyframes particleFloat{
  0%{transform:translateY(0) scale(1);opacity:1}
  100%{transform:translateY(-120px) scale(0);opacity:0}
}

/* === LOADING === */
.loading{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:60vh;gap:16px;
}
.loading-bar{
  width:120px;height:8px;border-radius:4px;
  background:rgba(255,255,255,0.06);overflow:hidden;
  border:1px solid var(--border);
}
.loading-bar-fill{
  height:100%;border-radius:3px;
  background:linear-gradient(90deg,var(--xp),#ffe066);
  animation:loadPulse 1.5s ease-in-out infinite;
  width:30%;
}
@keyframes loadPulse{
  0%,100%{transform:translateX(-100%)}
  50%{transform:translateX(300%)}
}
.loading-text{
  font-family:var(--font-pixel);font-size:7px;
  color:var(--text3);letter-spacing:2px;
}

/* Scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

@media (prefers-reduced-motion:reduce){
  *{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
}
@media (min-width:520px){
  .container{padding:32px 16px 80px}
}
</style>
</head>
<body>

<div class="container" id="app">
  <div class="loading">
    <div class="loading-bar"><div class="loading-bar-fill"></div></div>
    <div class="loading-text">LOADING SAVE FILE...</div>
  </div>
</div>

<script>
const COST=1688,NAME='悠享年卡';
const ICONS={'🎢 入园':'🎢','🍔 餐饮':'🍔','🎁 商品折扣':'🎁','🅿️ 停车':'🅿️','🎪 活动/福利':'🎪','🏨 酒店折扣':'🏨'};
const SKILL_COLORS={
  '🎢 入园':'var(--green)','🍔 餐饮':'#f97316','🎁 商品折扣':'#ec4899',
  '🅿️ 停车':'var(--blue)','🎪 活动/福利':'var(--purple)','🏨 酒店折扣':'#06b6d4'
};

// Level thresholds: [xp needed, title]
const LEVELS=[
  [0,'初出茅庐的访客'],
  [200,'见习冒险者'],
  [400,'乐园探索者'],
  [600,'资深玩家'],
  [800,'项目大师'],
  [1000,'回本先锋'],
  [1200,'省钱达人'],
  [1400,'传奇常客'],
  [1688,'回本王者'],
  [2000,'超越极限'],
  [2500,'乐园之神'],
  [Infinity,'???']
];

function getLevel(xp){
  for(let i=LEVELS.length-1;i>=0;i--){
    if(xp>=LEVELS[i][0])return{
      level:i+1,
      title:LEVELS[i][1],
      currentXP:xp-LEVELS[i][0],
      nextXP:i<LEVELS.length-1?(LEVELS[i+1][0]-LEVELS[i][0]):0,
      totalXP:xp,
      isMax:i===LEVELS.length-1
    };
  }
  return{level:1,title:LEVELS[0][1],currentXP:0,nextXP:LEVELS[1][0],totalXP:0,isMax:false};
}

function fmtDate(d){
  const dt=new Date(d+'T00:00:00');
  const w=['日','一','二','三','四','五','六'];
  return`${dt.getMonth()+1}月${dt.getDate()}日 周${w[dt.getDay()]}`;
}

function fmtDateShort(d){
  const dt=new Date(d+'T00:00:00');
  return`${dt.getMonth()+1}/${dt.getDate()}`;
}

function countUp(el,target,prefix='',suffix='',duration=1200){
  const start=performance.now();
  (function step(now){
    const p=Math.min((now-start)/duration,1);
    const ease=1-Math.pow(1-p,4);
    el.textContent=prefix+Math.round(ease*target)+suffix;
    if(p<1)requestAnimationFrame(step);
  })(start);
}

function spawnParticles(x,y,color,count=8){
  const box=document.createElement('div');box.className='particles';
  for(let i=0;i<count;i++){
    const p=document.createElement('div');p.className='particle';
    const size=3+Math.random()*5;
    const angle=Math.random()*Math.PI*2;
    const dist=30+Math.random()*60;
    p.style.cssText=`
      left:${x+Math.cos(angle)*dist}px;top:${y}px;
      width:${size}px;height:${size}px;background:${color};
      animation-delay:${Math.random()*0.3}s;
      animation-duration:${1+Math.random()*1.5}s;
    `;
    box.appendChild(p);
  }
  document.body.appendChild(box);
  setTimeout(()=>box.remove(),4000);
}

function showLevelUp(done){
  const overlay=document.createElement('div');
  overlay.className='levelup-overlay';
  overlay.innerHTML=`
    <div class="levelup-flash"></div>
    <div class="levelup-text">
      ${done?'★ BOSS DEFEATED ★<br>回本达成！':'★ LEVEL UP ★'}
    </div>
  `;
  document.body.appendChild(overlay);
  requestAnimationFrame(()=>overlay.classList.add('show'));
  setTimeout(()=>{overlay.classList.remove('show');setTimeout(()=>overlay.remove(),300)},2000);
}

function render(records){
  const entrySaved=records.filter(r=>r.type==='🎢 入园').reduce((s,r)=>s+r.saved,0);
  const parkSpend=records.filter(r=>r.type!=='🎢 入园').reduce((s,r)=>s+r.paid,0);
  const net=entrySaved-parkSpend;
  const pct=Math.min(Math.max(net/COST*100,0),999);
  const done=net>=COST;
  const remaining=Math.max(COST-net,0);

  // Visit aggregation
  const visitMap={};
  records.forEach(r=>{
    if(!visitMap[r.date])visitMap[r.date]={date:r.date,saved:0,spent:0,items:[]};
    if(r.type==='🎢 入园')visitMap[r.date].saved+=r.saved;
    else visitMap[r.date].spent+=r.paid;
    visitMap[r.date].items.push(r);
  });
  const visits=Object.values(visitMap).sort((a,b)=>a.date.localeCompare(b.date));
  let cum=0;
  visits.forEach(v=>{cum+=v.saved-v.spent;v.cumNet=cum;v.net=v.saved-v.spent});
  const visitCount=visits.length;
  const avgNet=visitCount>0?net/visitCount:0;
  const needMore=avgNet>0?Math.ceil(remaining/avgNet):'∞';

  // Best / worst
  let bestIdx=-1,worstIdx=-1,bestNet=-Infinity,worstNet=Infinity;
  visits.forEach((v,i)=>{
    if(v.net>bestNet){bestNet=v.net;bestIdx=i}
    if(v.net<worstNet){worstNet=v.net;worstIdx=i}
  });

  // Category breakdown
  const catMap={};
  records.forEach(r=>{
    const key=r.type;
    if(!catMap[key])catMap[key]={type:key,saved:0,spent:0,count:0};
    catMap[key].saved+=r.saved;catMap[key].spent+=r.paid;catMap[key].count++;
  });
  const cats=Object.values(catMap).sort((a,b)=>(b.saved+b.spent)-(a.saved+a.spent));
  const maxCatVal=Math.max(...cats.map(c=>c.saved+c.spent));

  // Level
  const lvl=getLevel(net);
  const xpPct=lvl.isMax?100:(lvl.nextXP>0?lvl.currentXP/lvl.nextXP*100:100);

  // Status effect
  let statusText,statusClass,statusPulse;
  if(done){statusText='BUFF：回本达成 · 每次入园纯赚';statusClass='buff';statusPulse='green'}
  else if(pct>=70){statusText='BUFF：接近目标 · 再接再厉';statusClass='buff';statusPulse='green'}
  else if(pct>=40){statusText='STATUS：稳步推进中';statusClass='neutral';statusPulse='gold'}
  else{statusText='DEBUFF：回本之路漫漫';statusClass='debuff';statusPulse='red'}

  // Max saved/spent for stat bar proportion
  const maxSS=Math.max(entrySaved,parkSpend,1);

  const app=document.getElementById('app');
  app.innerHTML=`
    <!-- ===== CHARACTER CARD ===== -->
    <div class="char-card">
      <div class="char-class">⚔ 年卡持有者 · ${NAME}</div>
      <div class="char-name">冒险者档案</div>
      <div class="char-subtitle">¥${COST} · 已入园 ${visitCount} 次 · ${done?'BOSS 已击败':'征途进行中'}</div>

      <div class="level-wrap">
        <div class="level-badge">
          <div class="level-label">LV</div>
          <div class="level-num" id="lvlNum">0</div>
        </div>
        <div class="level-info">
          <div class="level-title">${lvl.title}</div>
          <div class="xp-bar-wrap">
            <div class="xp-bar-label">
              <span>EXP ${lvl.isMax?'MAX':''}</span>
              <span id="xpText">${lvl.isMax?'MAX':'0 / '+lvl.nextXP}</span>
            </div>
            <div class="xp-bar">
              <div class="xp-bar-fill" id="xpFill"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- HP (saved) / MP (spent) style bars -->
      <div class="stat-bars">
        <div class="stat-bar-item">
          <div class="stat-bar-header">
            <span class="stat-bar-tag save">SAVE</span>
            <span class="stat-bar-val save" id="statSave">¥0</span>
          </div>
          <div class="stat-bar-track">
            <div class="stat-bar-fill save" id="saveFill" data-target="${entrySaved/maxSS*100}"></div>
          </div>
        </div>
        <div class="stat-bar-item">
          <div class="stat-bar-header">
            <span class="stat-bar-tag spend">COST</span>
            <span class="stat-bar-val spend" id="statSpend">¥0</span>
          </div>
          <div class="stat-bar-track">
            <div class="stat-bar-fill spend" id="spendFill" data-target="${parkSpend/maxSS*100}"></div>
          </div>
        </div>
      </div>

      <!-- Quick stats -->
      <div class="quick-stats">
        <div class="q-stat">
          <div class="q-stat-val" style="color:${net>=0?'var(--green)':'var(--red)'}" id="netVal">¥0</div>
          <div class="q-stat-lbl">净收益</div>
        </div>
        <div class="q-stat">
          <div class="q-stat-val" style="color:var(--xp)" id="pctVal">0%</div>
          <div class="q-stat-lbl">回本率</div>
        </div>
        <div class="q-stat">
          <div class="q-stat-val" style="color:var(--blue)">¥${Math.round(avgNet)}</div>
          <div class="q-stat-lbl">场均净值</div>
        </div>
      </div>

      <!-- Status effect -->
      <div style="text-align:center">
        <div class="status-effect ${statusClass}">
          <div class="status-pulse ${statusPulse}"></div>
          ${statusText}
        </div>
      </div>
    </div>

    <!-- ===== NEXT QUEST / PREDICTION ===== -->
    ${!done?`
    <div class="predict">
      <div class="predict-icon">🎯</div>
      <div class="predict-text">
        <strong>BOSS 生命值：¥${remaining}</strong><br>
        按当前 DPS，预计再刷 <strong>${needMore} 次</strong>可击败
      </div>
    </div>
    `:`
    <div class="predict">
      <div class="predict-icon">🏆</div>
      <div class="predict-text" style="color:var(--green)">
        <strong>BOSS DEFEATED!</strong><br>
        已回本，继续入园都是纯收益
      </div>
    </div>
    `}

    <!-- ===== QUEST LOG (visits) ===== -->
    <div class="section">
      <div class="section-head">
        <div class="section-title"><span class="pixel-icon">⚔</span> 冒险日志</div>
        <div class="section-badge">${visitCount} QUESTS</div>
      </div>
      <div class="section-body">
        ${visits.slice().reverse().map((v,ri)=>{
          const origIdx=visits.length-1-ri;
          const isBest=origIdx===bestIdx&&visitCount>1;
          const isWorst=origIdx===worstIdx&&visitCount>1&&worstNet<0;
          const total=v.saved+v.spent||1;
          const questClass=isBest?'legendary':(isWorst?'failed':'');
          const isHidden=ri>=3;
          return`<div class="quest ${questClass}${isHidden?' detail-hidden':''}">
            <div class="quest-header">
              <div class="quest-title">
                <span class="quest-num">#${origIdx+1}</span>
                <span class="quest-date">${fmtDate(v.date)}</span>
                ${isBest?'<span class="quest-rarity legendary">LEGENDARY</span>':''}
                ${isWorst?'<span class="quest-rarity failed">FAILED</span>':''}
              </div>
              <span class="quest-reward ${v.net>=0?'pos':'neg'}">${v.net>=0?'+':''}¥${v.net}</span>
            </div>
            <div class="loot-bar">
              <div class="loot-seg gold" style="flex-grow:${v.saved/total}">+${v.saved}</div>
              ${v.spent>0?`<div class="loot-seg loss" style="flex-grow:${v.spent/total}">-${v.spent}</div>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
      ${visits.length>3?`
      <div class="detail-toggle" id="questToggle">
        <span>展开全部冒险</span>
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      `:''}
    </div>

    <!-- ===== SKILL TREE (categories) ===== -->
    <div class="section">
      <div class="section-head">
        <div class="section-title"><span class="pixel-icon">✦</span> 技能树</div>
      </div>
      <div class="section-body">
        <div class="skill-tree">
          ${cats.map(c=>{
            const val=c.type==='🎢 入园'?c.saved:c.spent;
            const color=SKILL_COLORS[c.type]||'var(--blue)';
            const icon=ICONS[c.type]||'📌';
            const label=c.type.replace(/^[^\s]+\s/,'');
            const isEntry=c.type==='🎢 入园';
            return`<div class="skill-item">
              <div class="skill-icon">${icon}</div>
              <div class="skill-info">
                <div class="skill-name">${label} <span style="color:var(--text3);font-size:9px">×${c.count}</span></div>
                <div class="skill-bar">
                  <div class="skill-bar-fill" style="background:${color}" data-target="${val/maxCatVal*100}"></div>
                </div>
              </div>
              <div class="skill-val" style="color:${isEntry?'var(--green)':'var(--red)'}">
                ${isEntry?'+':'−'}¥${val}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>

    <!-- ===== ADVENTURE MAP (timeline) ===== -->
    ${visits.length>=2?`
    <div class="section">
      <div class="section-head">
        <div class="section-title"><span class="pixel-icon">☆</span> 冒险地图</div>
        <div class="section-badge">${done?'ALL CLEAR':'EXPLORING'}</div>
      </div>
      <div class="section-body">
        <div class="map-wrap">
          <div class="map-line"></div>
          ${visits.map((v,i)=>{
            const isCheckpoint=v.cumNet>=COST&&(i===0||visits[i-1].cumNet<COST);
            return`<div class="map-node${isCheckpoint?' checkpoint':''}">
              <div class="map-dot"></div>
              <div class="map-date">${fmtDateShort(v.date)} · 第 ${i+1} 次</div>
              <div class="map-desc">${v.net>=0?'战利品丰富！':'消耗了一些补给...'}</div>
              <div class="map-loot" style="color:${v.net>=0?'var(--green)':'var(--red)'}">
                ${v.net>=0?'+':''}¥${v.net} ${isCheckpoint?'<span style="color:var(--xp)">★ BREAK EVEN!</span>':''}
                <span style="color:var(--text3);font-weight:400">累计 ¥${v.cumNet}</span>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
    `:''}

    <!-- ===== ITEM LOG (details) ===== -->
    <div class="section">
      <div class="section-head">
        <div class="section-title"><span class="pixel-icon">▤</span> 物品清单</div>
        <div class="section-badge">${records.length} ITEMS</div>
      </div>
      <div class="section-body">
        ${Object.entries(visitMap).sort((a,b)=>b[0].localeCompare(a[0])).map(([date,v],gi)=>{
          const dayNet=v.saved-v.spent;
          const isHidden=gi>=2;
          return`<div class="${isHidden?'detail-hidden detail-group':'detail-group'}" style="margin-bottom:10px">
            <div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);margin-bottom:3px;font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--text3)">
              <span style="width:4px;height:4px;border-radius:50%;background:${dayNet>=0?'var(--green)':'var(--red)'};flex-shrink:0"></span>
              ${fmtDate(date)}
              <span style="margin-left:auto;font-weight:700;color:${dayNet>=0?'var(--green)':'var(--red)'}">
                ${dayNet>=0?'+':''}¥${dayNet}
              </span>
            </div>
            ${v.items.map(item=>{
              const isE=item.type==='🎢 入园';
              const disp=isE?'+¥'+item.saved:(item.paid>0?'-¥'+item.paid:'¥0');
              const color=isE&&item.saved>0?'var(--green)':(item.paid>0?'var(--red)':'var(--text3)');
              return`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0 5px 10px">
                <div style="display:flex;align-items:center;gap:6px;min-width:0">
                  <span style="font-size:12px;width:18px;text-align:center;flex-shrink:0">${ICONS[item.type]||'📌'}</span>
                  <span style="font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text2)">${item.name}</span>
                </div>
                <span style="font-family:var(--font-mono);font-size:11px;font-weight:600;flex-shrink:0;color:${color}">${disp}</span>
              </div>`;
            }).join('')}
          </div>`;
        }).join('')}
      </div>
      ${Object.keys(visitMap).length>2?`
      <div class="detail-toggle" id="detailToggle">
        <span>展开全部物品</span>
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      `:''}
    </div>

    <div class="footer">
      UNIVERSAL STUDIOS TRACKER<br>
      — ADVENTURE LOG —
    </div>
  `;

  // ============================================
  // ANIMATIONS
  // ============================================

  // XP bar fill
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const xpFill=document.getElementById('xpFill');
    if(xpFill)xpFill.style.width=Math.min(xpPct,100)+'%';

    // Stat bar fills
    document.querySelectorAll('[data-target]').forEach(el=>{
      el.style.width=el.dataset.target+'%';
    });
  }));

  // Level count-up
  const lvlEl=document.getElementById('lvlNum');
  if(lvlEl){
    const start=performance.now();
    const targetLvl=lvl.level;
    (function step(now){
      const p=Math.min((now-start)/800,1);
      const ease=1-Math.pow(1-p,3);
      lvlEl.textContent=Math.round(ease*targetLvl);
      if(p<1)requestAnimationFrame(step);
    })(start);
  }

  // XP text animation
  if(!lvl.isMax){
    const xpTextEl=document.getElementById('xpText');
    if(xpTextEl){
      const start=performance.now();
      (function step(now){
        const p=Math.min((now-start)/1200,1);
        const ease=1-Math.pow(1-p,4);
        xpTextEl.textContent=Math.round(ease*lvl.currentXP)+' / '+lvl.nextXP;
        if(p<1)requestAnimationFrame(step);
      })(start);
    }
  }

  // Value count-ups
  const netEl=document.getElementById('netVal');
  if(netEl)countUp(netEl,Math.abs(net),net>=0?'¥':'-¥','',1200);

  const pctEl=document.getElementById('pctVal');
  if(pctEl){
    const start=performance.now();
    const target=Math.min(pct,999);
    (function step(now){
      const p=Math.min((now-start)/1400,1);
      const ease=1-Math.pow(1-p,4);
      pctEl.textContent=(ease*target).toFixed(1)+'%';
      if(p<1)requestAnimationFrame(step);
    })(start);
  }

  const saveEl=document.getElementById('statSave');
  if(saveEl)countUp(saveEl,entrySaved,'¥','',1000);

  const spendEl=document.getElementById('statSpend');
  if(spendEl)countUp(spendEl,parkSpend,'¥','',1000);

  // Level-up flash for break-even
  if(done)setTimeout(()=>showLevelUp(true),600);

  // Quest toggle
  const questToggle=document.getElementById('questToggle');
  if(questToggle){
    questToggle.addEventListener('click',()=>{
      const parent=questToggle.closest('.section');
      const hidden=parent.querySelectorAll('.detail-hidden');
      const isOpen=questToggle.classList.toggle('open');
      hidden.forEach(el=>el.classList.toggle('show',isOpen));
      questToggle.querySelector('span').textContent=isOpen?'收起冒险':'展开全部冒险';
    });
  }

  // Detail toggle
  const detailToggle=document.getElementById('detailToggle');
  if(detailToggle){
    detailToggle.addEventListener('click',()=>{
      const parent=detailToggle.closest('.section');
      const hidden=parent.querySelectorAll('.detail-hidden');
      const isOpen=detailToggle.classList.toggle('open');
      hidden.forEach(el=>el.classList.toggle('show',isOpen));
      detailToggle.querySelector('span').textContent=isOpen?'收起物品':'展开全部物品';
    });
  }
}

const DATA=[{"name":"入园","date":"2026-02-08","type":"🎢 入园","original":300,"paid":0,"saved":300},{"name":"停车","date":"2026-02-08","type":"🅿️ 停车","original":50,"paid":50,"saved":0},{"name":"功夫熊猫吊杠","date":"2026-02-08","type":"🎪 活动/福利","original":40,"paid":40,"saved":0},{"name":"餐饮","date":"2026-02-08","type":"🍔 餐饮","original":40,"paid":40,"saved":0}];
render(DATA);
</script>
</body>
