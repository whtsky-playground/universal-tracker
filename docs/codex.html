<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>环球影城年卡回本宇宙舱</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

:root{
  --bg-a:#fff4e6;
  --bg-b:#e8fbf5;
  --bg-c:#e9efff;
  --ink:#10213b;
  --ink-soft:#5f6f87;
  --line:rgba(16,33,59,.11);
  --card:rgba(255,255,255,.74);
  --card-strong:rgba(255,255,255,.9);
  --shadow:0 24px 60px rgba(38,61,101,.16);
  --coral:#ff5b38;
  --teal:#0da6a4;
  --gold:#f6b216;
  --rose:#ea4f77;
  --mint:#18b360;
  --danger:#de3c4b;
}

*{box-sizing:border-box;margin:0;padding:0}

html,body{min-height:100%}

body{
  font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 6% 12%, rgba(255,91,56,.16), transparent 30%),
    radial-gradient(circle at 94% 20%, rgba(13,166,164,.18), transparent 34%),
    radial-gradient(circle at 18% 92%, rgba(246,178,22,.14), transparent 30%),
    linear-gradient(130deg,var(--bg-a),var(--bg-b) 45%,var(--bg-c));
  overflow-x:hidden;
}

.bg-stage{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.blob{
  position:absolute;
  border-radius:999px;
  filter:blur(58px);
  opacity:.45;
  animation:float 16s ease-in-out infinite alternate;
}
.blob.b1{width:260px;height:260px;background:#ff8f70;left:-50px;top:6%;animation-duration:18s}
.blob.b2{width:280px;height:280px;background:#5cd3d1;right:-70px;top:18%;animation-duration:22s}
.blob.b3{width:220px;height:220px;background:#ffd469;left:28%;bottom:-80px;animation-duration:14s}

.constellation{
  position:absolute;
  inset:0;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.75) 1.1px, transparent 1.2px),
    radial-gradient(circle at 72% 16%, rgba(255,255,255,.7) 1.3px, transparent 1.4px),
    radial-gradient(circle at 42% 78%, rgba(255,255,255,.62) .9px, transparent 1px),
    radial-gradient(circle at 84% 84%, rgba(255,255,255,.58) .9px, transparent 1px),
    radial-gradient(circle at 12% 62%, rgba(255,255,255,.65) 1px, transparent 1.2px);
  opacity:.65;
}

@keyframes float{
  0%{transform:translateY(0) translateX(0) scale(1)}
  50%{transform:translateY(20px) translateX(-14px) scale(1.07)}
  100%{transform:translateY(-12px) translateX(18px) scale(.95)}
}

.app{
  position:relative;
  z-index:1;
  max-width:960px;
  margin:0 auto;
  padding:18px 14px 72px;
}

.glass{
  background:var(--card);
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  border-radius:28px;
}

.hero{
  position:relative;
  padding:24px 18px 18px;
  overflow:hidden;
}

.hero::before,
.hero::after{
  content:'';
  position:absolute;
  width:220px;
  height:220px;
  border-radius:50%;
  pointer-events:none;
  opacity:.25;
}

.hero::before{background:radial-gradient(circle,var(--coral),transparent 70%);top:-120px;right:-90px}
.hero::after{background:radial-gradient(circle,var(--teal),transparent 72%);left:-90px;bottom:-140px}

.hero-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  margin-bottom:14px;
  position:relative;
  z-index:2;
}

.title-wrap .eyebrow{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  color:var(--ink-soft);
  letter-spacing:.6px;
  margin-bottom:6px;
}

.title-wrap h1{
  font-size:26px;
  line-height:1.15;
  font-weight:900;
  letter-spacing:.3px;
}

.title-wrap .sub{
  margin-top:4px;
  color:var(--ink-soft);
  font-size:13px;
}

.tag{
  border:1px solid rgba(16,33,59,.15);
  color:var(--ink-soft);
  border-radius:999px;
  padding:5px 11px;
  font-size:12px;
  background:rgba(255,255,255,.6);
  white-space:nowrap;
}

.hero-main{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:12px;
  position:relative;
  z-index:2;
}

.value .state{
  font-size:12px;
  color:var(--ink-soft);
  margin-bottom:4px;
}

.big-money{
  font-family:'Bebas Neue','Noto Sans SC',sans-serif;
  font-size:74px;
  line-height:.88;
  letter-spacing:1px;
  color:var(--ink);
  text-shadow:0 8px 20px rgba(255,91,56,.15);
}

.big-money.negative{color:var(--danger);text-shadow:0 8px 18px rgba(222,60,75,.16)}
.big-money.positive{color:#0f7d6a;text-shadow:0 8px 18px rgba(24,179,96,.18)}

.value .hint{font-size:13px;color:var(--ink-soft)}

.ring{
  width:156px;
  aspect-ratio:1;
  position:relative;
  flex-shrink:0;
}

.ring svg{width:100%;height:100%;display:block}

.ring-track{fill:none;stroke:rgba(16,33,59,.12);stroke-width:11}
.ring-progress{
  fill:none;
  stroke:url(#ringGrad);
  stroke-width:11;
  stroke-linecap:round;
  transform:rotate(-90deg);
  transform-origin:50% 50%;
  stroke-dasharray:0 100;
  transition:stroke-dasharray 1.45s cubic-bezier(.22,1,.36,1);
}

.ring-center{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.ring-center b{
  font-family:'Bebas Neue','Noto Sans SC',sans-serif;
  font-size:40px;
  line-height:1;
  letter-spacing:1px;
}

.ring-center span{font-size:12px;color:var(--ink-soft);letter-spacing:.8px}

.stats-strip{
  margin-top:12px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  position:relative;
  z-index:2;
}

.mini{
  padding:10px 9px;
  border-radius:18px;
  border:1px solid rgba(16,33,59,.08);
  background:rgba(255,255,255,.64);
  text-align:center;
}

.mini .k{font-family:'Bebas Neue','Noto Sans SC',sans-serif;font-size:34px;line-height:.95;letter-spacing:.7px}
.mini .l{margin-top:2px;font-size:11px;color:var(--ink-soft)}
.mini.save .k{color:#0f7d6a}
.mini.cost .k{color:var(--danger)}

.milestones{
  margin-top:16px;
  position:relative;
  z-index:2;
}

.milestones .rail{
  position:relative;
  height:6px;
  border-radius:999px;
  background:rgba(16,33,59,.12);
  overflow:hidden;
}

.milestones .rail::after{
  content:'';
  position:absolute;
  inset:0;
  width:var(--progress-width,0%);
  background:linear-gradient(90deg,var(--coral),var(--gold));
  border-radius:inherit;
  transition:width 1.4s cubic-bezier(.22,1,.36,1);
}

.ms-points{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
}

.ms-point{
  width:52px;
  text-align:center;
  color:var(--ink-soft);
  font-size:11px;
}

.ms-point .dot{
  width:12px;
  height:12px;
  border-radius:50%;
  margin:0 auto 4px;
  border:2px solid rgba(16,33,59,.24);
  background:#fff;
  transition:all .45s ease;
}

.ms-point.on .dot{
  border-color:rgba(255,91,56,.8);
  box-shadow:0 0 0 6px rgba(255,91,56,.13);
  background:var(--coral);
}

.deck{
  margin-top:12px;
  display:grid;
  gap:12px;
}

.panel{
  padding:16px 14px;
}

.panel h2{
  font-size:14px;
  letter-spacing:.9px;
  text-transform:uppercase;
  color:var(--ink-soft);
  margin-bottom:10px;
}

.kpi-grid{
  display:grid;
  gap:10px;
  grid-template-columns:repeat(2,minmax(0,1fr));
}

.kpi{
  border:1px solid rgba(16,33,59,.08);
  border-radius:18px;
  background:var(--card-strong);
  padding:10px;
  min-height:90px;
}

.kpi .name{font-size:12px;color:var(--ink-soft);margin-bottom:6px}
.kpi .num{font-family:'Bebas Neue','Noto Sans SC',sans-serif;font-size:42px;line-height:.9;letter-spacing:.8px}
.kpi .sub{font-size:12px;color:var(--ink-soft);margin-top:2px}

.kpi.good .num{color:#0f7d6a}
.kpi.bad .num{color:var(--danger)}

.chart-shell{padding:0}

.chart-top{
  padding:16px 14px 6px;
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-end;
}

.chart-top .summary{font-size:12px;color:var(--ink-soft)}

.chart-wrap{padding:0 8px 10px}
.chart-wrap svg{display:block;width:100%;height:auto}

.axis-label{
  font-size:10px;
  fill:rgba(95,111,135,.94);
}

.goal-label{font-size:10px;fill:rgba(16,33,59,.72);font-weight:700}

.trend-line{
  fill:none;
  stroke:url(#trendGrad);
  stroke-width:3;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.trend-area{fill:url(#trendArea)}
.trend-point{fill:#ff6e4d;stroke:#fff;stroke-width:1.8}

.chart-empty{
  text-align:center;
  padding:24px 10px 28px;
  color:var(--ink-soft);
  font-size:13px;
}

.breakdown-list{display:grid;gap:8px}
.break-row{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:8px;
  align-items:center;
}

.break-type{font-size:12px;min-width:88px;max-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.break-track{
  height:10px;
  border-radius:999px;
  background:rgba(16,33,59,.1);
  overflow:hidden;
}

.break-fill{
  height:100%;
  border-radius:inherit;
  background:linear-gradient(90deg,var(--teal),#3fc1bf);
}

.break-val{font-size:12px;color:var(--ink-soft);white-space:nowrap}

.timeline{display:grid;gap:10px}
.day{
  border:1px solid rgba(16,33,59,.08);
  border-radius:18px;
  background:rgba(255,255,255,.62);
  padding:10px;
}

.day-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
}

.day-date{font-size:12px;color:var(--ink-soft)}
.day-net{font-family:'Bebas Neue','Noto Sans SC',sans-serif;font-size:28px;line-height:.9;letter-spacing:.5px}
.day-net.good{color:#0f7d6a}
.day-net.bad{color:var(--danger)}

.item-list{display:grid;gap:6px}
.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  font-size:13px;
  padding:6px 8px;
  border-radius:12px;
  background:rgba(255,255,255,.7);
}

.item-left{display:flex;align-items:center;gap:7px;min-width:0}
.ico{font-size:14px;flex-shrink:0}
.item-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-amount{font-weight:700;flex-shrink:0}
.item-amount.good{color:#0f7d6a}
.item-amount.bad{color:var(--danger)}
.item-amount.zero{color:var(--ink-soft);font-weight:500}

.footer{
  margin-top:14px;
  text-align:center;
  color:rgba(95,111,135,.85);
  font-size:11px;
}

.reveal{opacity:0;transform:translateY(18px);transition:opacity .55s ease,transform .55s ease}
.reveal.show{opacity:1;transform:none}

.celebrate{position:fixed;inset:0;pointer-events:none;z-index:66;overflow:hidden}
.spark{
  position:absolute;
  top:-12px;
  width:8px;
  height:8px;
  border-radius:2px;
  animation:fall linear forwards;
}

@keyframes fall{
  to{transform:translateY(104vh) rotate(680deg);opacity:0}
}

@media (min-width:860px){
  .app{padding:24px 20px 88px}
  .hero{padding:28px 24px 22px}
  .title-wrap h1{font-size:32px}
  .big-money{font-size:92px}
  .ring{width:174px}
  .stats-strip{grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}

  .deck{
    grid-template-columns:1fr 1fr;
  }

  .panel.span-2{grid-column:1 / -1}
  .kpi-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
}
</style>
</head>
<body>
<div class="bg-stage" aria-hidden="true">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="constellation"></div>
</div>

<main class="app" id="app">
  <section class="glass hero">
    <div class="chart-empty">正在点亮回本宇宙舱...</div>
  </section>
</main>

<script>
const COST = 1688;
const NAME = '悠享年卡';
const ENTRY_TYPE = '🎢 入园';

const TYPE_ICONS = {
  '🎢 入园':'🎢',
  '🍔 餐饮':'🍔',
  '🎁 商品折扣':'🎁',
  '🅿️ 停车':'🅿️',
  '🎪 活动/福利':'🎪',
  '🏨 酒店折扣':'🏨'
};

const nf = new Intl.NumberFormat('zh-CN');

function clamp(value,min,max){
  return Math.min(max, Math.max(min, value));
}

function toNum(value){
  const n = Number(value);
  return Number.isFinite(n) ? n : 0;
}

function escapeHtml(value){
  return String(value ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function money(value){
  return '¥' + nf.format(Math.round(Math.abs(value)));
}

function signedMoney(value){
  const sign = value > 0 ? '+' : value < 0 ? '-' : '';
  return sign + money(value);
}

function fmtDate(dateString){
  if(!dateString){
    return '未知日期';
  }
  const dt = new Date(dateString + 'T00:00:00');
  if(Number.isNaN(dt.getTime())){
    return dateString;
  }
  const week = ['日','一','二','三','四','五','六'][dt.getDay()];
  return `${dt.getMonth()+1}月${dt.getDate()}日 周${week}`;
}

function normalizeRecords(records){
  if(!Array.isArray(records)) return [];

  return records
    .map((record)=>{
      const original = toNum(record.original);
      const paid = toNum(record.paid);
      const saved = record.saved === undefined || record.saved === null
        ? (original - paid)
        : toNum(record.saved);

      return {
        name: String(record.name || '未命名项目'),
        date: String(record.date || '').slice(0,10),
        type: String(record.type || ''),
        original,
        paid,
        saved
      };
    })
    .filter((record)=>record.date);
}

function buildTrendSvg(visits){
  if(!visits.length){
    return '<div class="chart-empty">还没有可展示的趋势曲线，去玩一次就有星轨啦。</div>';
  }

  const width = 780;
  const height = 280;
  const pad = {top:20,right:16,bottom:34,left:56};
  const plotW = width - pad.left - pad.right;
  const plotH = height - pad.top - pad.bottom;

  const values = visits.map((v)=>v.cumNet);
  const maxVal = Math.max(COST * 1.05, ...values, 0);
  const minVal = Math.min(0, ...values);
  const span = maxVal - minVal || 1;

  const x = (idx)=>visits.length === 1
    ? pad.left + plotW / 2
    : pad.left + (idx / (visits.length - 1)) * plotW;

  const y = (val)=>pad.top + ((maxVal - val) / span) * plotH;

  const points = visits.map((v,idx)=>`${x(idx).toFixed(2)},${y(v.cumNet).toFixed(2)}`);
  const zeroY = y(0);
  const firstX = x(0);
  const lastX = x(visits.length - 1);
  const areaPath = `M ${firstX} ${zeroY} L ${points.join(' L ')} L ${lastX} ${zeroY} Z`;

  const tickCount = 4;
  const ticks = Array.from({length:tickCount+1},(_,i)=>{
    const val = minVal + (span / tickCount) * i;
    return {val, y:y(val)};
  });

  const dateStep = Math.max(1, Math.ceil(visits.length / 5));
  const xLabels = visits
    .map((v,idx)=>({v,idx}))
    .filter((entry,idx)=>idx % dateStep === 0 || idx === visits.length - 1)
    .map(({v,idx})=>{
      const dt = new Date(v.date + 'T00:00:00');
      const label = Number.isNaN(dt.getTime()) ? v.date : `${dt.getMonth()+1}/${dt.getDate()}`;
      return `<text class="axis-label" text-anchor="middle" x="${x(idx)}" y="${height-8}">${label}</text>`;
    })
    .join('');

  const pointDots = visits
    .map((v,idx)=>`<circle class="trend-point" cx="${x(idx)}" cy="${y(v.cumNet)}" r="3.8"/>`)
    .join('');

  return `
<svg viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="回本趋势图">
  <defs>
    <linearGradient id="trendGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0da6a4"/>
      <stop offset="100%" stop-color="#ff5b38"/>
    </linearGradient>
    <linearGradient id="trendArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8f70" stop-opacity=".32"/>
      <stop offset="100%" stop-color="#ff8f70" stop-opacity="0"/>
    </linearGradient>
  </defs>

  ${ticks.map((t)=>`<line x1="${pad.left}" y1="${t.y}" x2="${width-pad.right}" y2="${t.y}" stroke="rgba(16,33,59,.12)" stroke-dasharray="4 6" />`).join('')}
  ${ticks.map((t)=>`<text class="axis-label" text-anchor="end" x="${pad.left-8}" y="${t.y+3}">${signedMoney(t.val)}</text>`).join('')}

  <line x1="${pad.left}" y1="${y(COST)}" x2="${width-pad.right}" y2="${y(COST)}" stroke="rgba(255,91,56,.48)" stroke-width="1.4" stroke-dasharray="7 4" />
  <text class="goal-label" text-anchor="end" x="${width-pad.right}" y="${y(COST)-6}">${money(COST)} 回本线</text>

  <path class="trend-area" d="${areaPath}"/>
  <polyline class="trend-line" points="${points.join(' ')}" />
  ${pointDots}
  ${xLabels}
</svg>`;
}

function fireworks(){
  const wrap = document.createElement('div');
  wrap.className = 'celebrate';

  const colors = ['#ff5b38','#0da6a4','#f6b216','#ea4f77','#18b360','#5f8bff'];
  for(let i=0;i<86;i++){
    const piece = document.createElement('i');
    piece.className = 'spark';
    piece.style.left = `${Math.random()*100}%`;
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.opacity = String(.66 + Math.random()*.3);
    piece.style.width = `${4 + Math.random()*8}px`;
    piece.style.height = `${4 + Math.random()*9}px`;
    piece.style.animationDuration = `${2.2 + Math.random()*1.8}s`;
    piece.style.animationDelay = `${Math.random()*.65}s`;
    wrap.appendChild(piece);
  }

  document.body.appendChild(wrap);
  setTimeout(()=>wrap.remove(), 4500);
}

function revealCards(){
  const nodes = Array.from(document.querySelectorAll('.reveal'));
  if(!nodes.length) return;

  if(!('IntersectionObserver' in window)){
    nodes.forEach((node)=>node.classList.add('show'));
    return;
  }

  const observer = new IntersectionObserver((entries,obs)=>{
    entries.forEach((entry)=>{
      if(!entry.isIntersecting) return;
      entry.target.classList.add('show');
      obs.unobserve(entry.target);
    });
  },{threshold:.12});

  nodes.forEach((node)=>observer.observe(node));
}

function render(data){
  const records = normalizeRecords(data).sort((a,b)=>a.date.localeCompare(b.date));

  const entrySaved = records
    .filter((r)=>r.type === ENTRY_TYPE)
    .reduce((sum,r)=>sum + r.saved,0);

  const parkSpend = records
    .filter((r)=>r.type !== ENTRY_TYPE)
    .reduce((sum,r)=>sum + r.paid,0);

  const net = entrySaved - parkSpend;
  const progressRaw = COST > 0 ? (net / COST) * 100 : 0;
  const progressView = clamp(progressRaw,0,100);
  const done = net >= COST;
  const remaining = Math.max(COST - net, 0);

  const visitMap = new Map();
  for(const record of records){
    if(!visitMap.has(record.date)){
      visitMap.set(record.date,{date:record.date,saved:0,spent:0,items:[]});
    }
    const day = visitMap.get(record.date);
    if(record.type === ENTRY_TYPE){
      day.saved += record.saved;
    }else{
      day.spent += record.paid;
    }
    day.items.push(record);
  }

  const visits = Array.from(visitMap.values()).sort((a,b)=>a.date.localeCompare(b.date));

  let cumulative = 0;
  visits.forEach((visit)=>{
    visit.net = visit.saved - visit.spent;
    cumulative += visit.net;
    visit.cumNet = cumulative;
  });

  const visitCount = visits.length;
  const avgNet = visitCount ? net / visitCount : 0;
  const needMore = done ? 0 : (avgNet > 0 ? Math.ceil(remaining / avgNet) : null);

  const bestDay = visitCount
    ? visits.reduce((best,cur)=>cur.net > best.net ? cur : best, visits[0])
    : null;

  const spendByType = records
    .filter((r)=>r.type !== ENTRY_TYPE && r.paid > 0)
    .reduce((acc,r)=>{
      acc[r.type] = (acc[r.type] || 0) + r.paid;
      return acc;
    },{});

  const spendRows = Object.entries(spendByType)
    .sort((a,b)=>b[1]-a[1]);

  const milestones = [0.25,0.5,0.75,1].map((p)=>({
    percent: Math.round(p * 100),
    reached: net >= COST * p
  }));

  const app = document.getElementById('app');

  app.innerHTML = `
<section class="glass hero reveal">
  <div class="hero-head">
    <div class="title-wrap">
      <div class="eyebrow">🎬 UNIVERSAL TRACKER · BEIJING</div>
      <h1>环球影城年卡回本宇宙舱</h1>
      <div class="sub">${NAME} · ${money(COST)} · 更新于 ${new Date().toLocaleDateString('zh-CN')}</div>
    </div>
    <span class="tag">${records.length} 条记录</span>
  </div>

  <div class="hero-main">
    <div class="value">
      <div class="state">${done ? '已突破回本线，接下来每次都在赚' : (net >= 0 ? '正在接近回本线' : '目前仍处于投入阶段')}</div>
      <div class="big-money ${net >= 0 ? 'positive' : 'negative'}">${signedMoney(net)}</div>
      <div class="hint">净回本 = 门票节省 - 园内花费</div>
    </div>

    <div class="ring" aria-label="回本进度环">
      <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0da6a4"/>
            <stop offset="50%" stop-color="#f6b216"/>
            <stop offset="100%" stop-color="#ff5b38"/>
          </linearGradient>
        </defs>
        <circle class="ring-track" cx="80" cy="80" r="62" pathLength="100"></circle>
        <circle class="ring-progress" cx="80" cy="80" r="62" pathLength="100" style="stroke-dasharray:${progressView} 100"></circle>
      </svg>
      <div class="ring-center">
        <b>${progressRaw.toFixed(1)}%</b>
        <span>回本率</span>
      </div>
    </div>
  </div>

  <div class="stats-strip">
    <div class="mini save">
      <div class="k">${money(entrySaved)}</div>
      <div class="l">门票节省</div>
    </div>
    <div class="mini cost">
      <div class="k">${money(parkSpend)}</div>
      <div class="l">园内花费</div>
    </div>
    <div class="mini">
      <div class="k">${done ? '达成' : money(remaining)}</div>
      <div class="l">${done ? '超出回本线' : '距离回本'}</div>
    </div>
  </div>

  <div class="milestones" style="--progress-width:${progressView}%">
    <div class="rail"></div>
    <div class="ms-points">
      ${milestones.map((m)=>`
      <div class="ms-point ${m.reached ? 'on' : ''}">
        <div class="dot"></div>
        <div>${m.percent}%</div>
      </div>`).join('')}
    </div>
  </div>
</section>

<section class="deck">
  <article class="glass panel reveal">
    <h2>经济驾驶舱</h2>
    <div class="kpi-grid">
      <div class="kpi">
        <div class="name">入园次数</div>
        <div class="num">${visitCount}</div>
        <div class="sub">按日期聚合</div>
      </div>
      <div class="kpi ${avgNet >= 0 ? 'good' : 'bad'}">
        <div class="name">平均单次净值</div>
        <div class="num">${signedMoney(avgNet)}</div>
        <div class="sub">净回本 / 入园次数</div>
      </div>
      <div class="kpi ${done || needMore !== null ? 'good' : 'bad'}">
        <div class="name">预计还需</div>
        <div class="num">${done ? '0' : (needMore === null ? '∞' : needMore)}</div>
        <div class="sub">${done ? '已达成回本' : '按当前均值估算(次)'}</div>
      </div>
      <div class="kpi ${bestDay && bestDay.net >= 0 ? 'good' : 'bad'}">
        <div class="name">最佳单日</div>
        <div class="num">${bestDay ? signedMoney(bestDay.net) : '—'}</div>
        <div class="sub">${bestDay ? fmtDate(bestDay.date) : '暂无数据'}</div>
      </div>
    </div>
  </article>

  <article class="glass panel reveal">
    <h2>花费构成</h2>
    ${spendRows.length ? `
      <div class="breakdown-list">
        ${spendRows.map(([type,val])=>`
          <div class="break-row">
            <div class="break-type">${escapeHtml(type || '其他')}</div>
            <div class="break-track"><div class="break-fill" style="width:${parkSpend > 0 ? ((val/parkSpend)*100).toFixed(1) : 0}%"></div></div>
            <div class="break-val">${money(val)}</div>
          </div>`).join('')}
      </div>` : `
      <div class="chart-empty">目前还没有园内额外花费，控制力拉满。</div>`}
  </article>

  <article class="glass panel chart-shell span-2 reveal">
    <div class="chart-top">
      <h2>回本星轨</h2>
      <div class="summary">累计净回本曲线 vs ${money(COST)} 目标线</div>
    </div>
    <div class="chart-wrap">${buildTrendSvg(visits)}</div>
  </article>

  <article class="glass panel span-2 reveal">
    <h2>逐次明细</h2>
    <div class="timeline">
      ${visits.length ? visits.slice().sort((a,b)=>b.date.localeCompare(a.date)).map((day)=>`
        <div class="day">
          <div class="day-head">
            <div class="day-date">${fmtDate(day.date)}</div>
            <div class="day-net ${day.net >= 0 ? 'good' : 'bad'}">${signedMoney(day.net)}</div>
          </div>
          <div class="item-list">
            ${day.items.map((item)=>{
              const isEntry = item.type === ENTRY_TYPE;
              const value = isEntry ? item.saved : item.paid;
              const amount = isEntry ? `+${money(value)}` : (value > 0 ? `-${money(value)}` : money(0));
              const cls = isEntry ? 'good' : (value > 0 ? 'bad' : 'zero');
              const icon = TYPE_ICONS[item.type] || '📌';
              return `<div class="item">
                <div class="item-left">
                  <span class="ico">${icon}</span>
                  <span class="item-name">${escapeHtml(item.name)}</span>
                </div>
                <span class="item-amount ${cls}">${amount}</span>
              </div>`;
            }).join('')}
          </div>
        </div>`).join('') : `<div class="chart-empty">还没有任何记录，等你第一次入园点亮时间线。</div>`}
    </div>
  </article>
</section>

<div class="footer reveal">数据来自 Notion · 单页模板 by Codex</div>
`;

  revealCards();

  if(done){
    setTimeout(fireworks, 700);
  }
}

const DATA = [{"name":"入园","date":"2026-02-08","type":"🎢 入园","original":300,"paid":0,"saved":300},{"name":"停车","date":"2026-02-08","type":"🅿️ 停车","original":50,"paid":50,"saved":0},{"name":"功夫熊猫吊杠","date":"2026-02-08","type":"🎪 活动/福利","original":40,"paid":40,"saved":0},{"name":"餐饮","date":"2026-02-08","type":"🍔 餐饮","original":40,"paid":40,"saved":0}];
render(DATA);
</script>
</body>
</html>
