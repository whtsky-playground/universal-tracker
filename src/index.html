<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎡 环球影城年卡回本追踪</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070d;--card:rgba(16,16,24,0.75);--border:rgba(255,255,255,0.06);
  --text:#eaeaf0;--dim:#5a5a6e;--dim2:#3d3d4f;
  --p1:#6c5ce7;--p2:#a29bfe;--p3:#d4afff;
  --g1:#00b894;--g2:#55efc4;
  --o1:#fdcb6e;--r1:#e17055;--r2:#ff7675;
}
body{
  font-family:'Inter',-apple-system,system-ui,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
}

/* Aurora BG */
.aurora{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.aurora .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15;animation:drift 20s ease-in-out infinite alternate}
.aurora .o1{width:500px;height:500px;background:var(--p1);top:-150px;left:-100px;animation-delay:0s}
.aurora .o2{width:400px;height:400px;background:var(--g1);top:30%;right:-100px;animation-delay:-5s;animation-duration:25s}
.aurora .o3{width:350px;height:350px;background:var(--p2);bottom:-100px;left:30%;animation-delay:-10s;animation-duration:18s}
@keyframes drift{
  0%{transform:translate(0,0) scale(1)}
  33%{transform:translate(40px,-30px) scale(1.1)}
  66%{transform:translate(-20px,40px) scale(0.95)}
  100%{transform:translate(30px,20px) scale(1.05)}
}

.wrap{max-width:520px;margin:0 auto;padding:48px 20px 80px;position:relative;z-index:1}

/* Glass card mixin */
.glass{
  background:var(--card);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:20px;
  position:relative;overflow:hidden;
}
.glass::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 10%,rgba(255,255,255,0.08) 50%,transparent 90%);
}

/* Header */
.hdr{text-align:center;margin-bottom:40px}
.hdr .logo{font-size:56px;display:block;margin-bottom:14px;filter:drop-shadow(0 4px 24px rgba(108,92,231,0.4))}
.hdr h1{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px;
  background:linear-gradient(135deg,var(--text),var(--p3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sub{font-size:13px;color:var(--dim);font-weight:400;letter-spacing:.5px}

/* Hero */
.hero{padding:32px 28px 28px;margin-bottom:16px}
.hero-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px}
.hero-left .label{font-size:11px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.hero-pct{font-size:56px;font-weight:900;letter-spacing:-3px;line-height:1;
  background:linear-gradient(135deg,var(--p1),var(--p2),var(--p3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-pct.done{background:linear-gradient(135deg,var(--g1),var(--g2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-right{text-align:right}
.hero-right .net{font-size:28px;font-weight:800;color:var(--g1);letter-spacing:-1px}
.hero-right .netlbl{font-size:11px;color:var(--dim);margin-top:2px}

/* Progress */
.bar-outer{height:6px;background:rgba(255,255,255,0.04);border-radius:3px;margin-bottom:24px;position:relative}
.bar-inner{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--p1),var(--p2));
  transition:width 2s cubic-bezier(.22,1,.36,1);box-shadow:0 0 20px var(--p1)}
.bar-inner.done{background:linear-gradient(90deg,var(--g1),var(--g2));box-shadow:0 0 20px var(--g1)}
.bar-glow{position:absolute;right:-3px;top:-5px;width:16px;height:16px;border-radius:50%;
  background:white;box-shadow:0 0 16px rgba(108,92,231,0.6);transition:right 2s cubic-bezier(.22,1,.36,1)}

.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:0}
.kpi{text-align:center;padding:8px 0}
.kpi:not(:last-child){border-right:1px solid var(--border)}
.kpi .kv{font-size:18px;font-weight:700;margin-bottom:2px}
.kpi .kl{font-size:10px;color:var(--dim);font-weight:500;letter-spacing:.5px}

/* Mini stat cards */
.mcards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.mc{padding:20px 16px;text-align:center}
.mc .mi{font-size:28px;display:block;margin-bottom:6px}
.mc .mn{font-size:28px;font-weight:900;letter-spacing:-1px;margin-bottom:2px}
.mc .md{font-size:11px;color:var(--dim);font-weight:500}

/* Chart */
.chart-wrap{padding:20px 20px 16px;margin-bottom:12px}
.chart-title{font-size:12px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px}
.chart-svg{width:100%;overflow:visible}
.chart-line{fill:none;stroke:url(#lineGrad);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.chart-area{fill:url(#areaGrad)}
.chart-goal{stroke:var(--dim2);stroke-width:1;stroke-dasharray:6 4}
.chart-dot{fill:var(--p2);filter:drop-shadow(0 0 6px rgba(162,155,254,0.6))}
.chart-label{font-size:10px;fill:var(--dim);font-weight:500}
.chart-goal-label{font-size:10px;fill:var(--dim);font-weight:600}
.chart-proj{stroke:var(--p1);stroke-width:1.5;stroke-dasharray:4 4;opacity:.4}

/* Visit bars */
.visits-wrap{padding:20px;margin-bottom:12px}
.visit{margin-bottom:16px}
.visit:last-child{margin-bottom:0}
.visit-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.visit-date{font-size:12px;font-weight:600;color:var(--dim)}
.visit-net{font-size:13px;font-weight:700}
.visit-net.pos{color:var(--g1)}.visit-net.neg{color:var(--r1)}
.visit-bars{display:flex;gap:4px;height:28px;border-radius:6px;overflow:hidden}
.vbar{border-radius:4px;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:600;color:rgba(255,255,255,0.9);min-width:24px;
  transition:flex-grow .8s cubic-bezier(.22,1,.36,1)}
.vbar.save{background:linear-gradient(135deg,var(--g1),var(--g2))}
.vbar.spend{background:linear-gradient(135deg,var(--r1),var(--r2))}

/* Timeline */
.tl-wrap{padding:20px}
.tl-group{margin-bottom:16px}
.tl-group:last-child{margin-bottom:0}
.tl-date{font-size:11px;font-weight:600;color:var(--dim);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.tl-dot{width:5px;height:5px;border-radius:50%;background:var(--p1)}
.tl-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0 5px 13px}
.tl-left{display:flex;align-items:center;gap:8px}
.tl-ico{font-size:14px;width:24px;text-align:center}
.tl-nm{font-size:13px;font-weight:500}
.tl-sv{font-size:13px;font-weight:700;color:var(--g1)}
.tl-sv.z{color:var(--dim);font-weight:400}
.tl-sv.neg{color:var(--r1)}

/* Footer */
.ft{text-align:center;margin-top:28px;font-size:11px;color:var(--dim);opacity:.4}

/* Anims */
.fi{opacity:0;transform:translateY(24px);animation:fadeUp .7s cubic-bezier(.22,1,.36,1) forwards}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.d1{animation-delay:.08s}.d2{animation-delay:.16s}.d3{animation-delay:.24s}
.d4{animation-delay:.32s}.d5{animation-delay:.4s}.d6{animation-delay:.48s}

/* Count-up */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

/* Confetti */
.confetti-box{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden}
.cft{position:absolute;width:8px;height:8px;border-radius:2px;top:-12px;
  animation:cfall 3.5s cubic-bezier(.25,.46,.45,.94) forwards}
@keyframes cfall{
  0%{transform:translateY(0) rotate(0) scale(1);opacity:1}
  80%{opacity:1}
  100%{transform:translateY(105vh) rotate(900deg) scale(.5);opacity:0}
}
</style>
</head>
<body>

<div class="aurora"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<div class="wrap" id="app"><div style="text-align:center;padding:100px 0;color:var(--dim)"><div style="font-size:32px;margin-bottom:12px">🎡</div>加载中…</div></div>

<script>
const COST=1688,NAME='悠享年卡';
const ICONS={'🎢 入园':'🎢','🍔 餐饮':'🍔','🎁 商品折扣':'🎁','🅿️ 停车':'🅿️','🎪 活动/福利':'🎪','🏨 酒店折扣':'🏨'};

function fmtDate(d){const dt=new Date(d+'T00:00:00'),w=['日','一','二','三','四','五','六'];
  return`${dt.getMonth()+1}月${dt.getDate()}日 周${w[dt.getDay()]}`}

function countUp(el,target,duration=1200){
  const start=performance.now();
  const fmt=v=>v.toFixed(1);
  (function step(now){
    const p=Math.min((now-start)/duration,1);
    const ease=1-Math.pow(1-p,3);
    el.textContent=fmt(ease*target)+'%';
    if(p<1)requestAnimationFrame(step);
  })(start);
}

function confetti(){
  const box=document.createElement('div');box.className='confetti-box';
  const cols=['#6c5ce7','#a29bfe','#00b894','#55efc4','#fdcb6e','#e17055','#fd79a8','#74b9ff','#ffeaa7'];
  for(let i=0;i<80;i++){const c=document.createElement('div');c.className='cft';
    c.style.left=Math.random()*100+'%';c.style.background=cols[~~(Math.random()*cols.length)];
    c.style.animationDelay=Math.random()*2.5+'s';c.style.animationDuration=(2.5+Math.random()*2)+'s';
    const s=4+Math.random()*10;c.style.width=s+'px';c.style.height=s+'px';box.appendChild(c)}
  document.body.appendChild(box);setTimeout(()=>box.remove(),6000);
}

function buildChart(visitData,svgW,svgH){
  const pad={t:20,r:16,b:28,l:40};
  const w=svgW-pad.l-pad.r,h=svgH-pad.t-pad.b;
  const maxY=Math.max(COST*1.15,Math.max(...visitData.map(v=>v.cumNet))*1.3);
  const dates=visitData.map(v=>v.date);

  const x=i=>pad.l+(dates.length===1?w/2:i/(dates.length-1)*w);
  const y=v=>pad.t+h-(v/maxY)*h;

  let svg=`<svg class="chart-svg" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="var(--p1)"/><stop offset="100%" stop-color="var(--p2)"/>
      </linearGradient>
      <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--p1)" stop-opacity="0.2"/><stop offset="100%" stop-color="var(--p1)" stop-opacity="0"/>
      </linearGradient>
    </defs>`;

  // Goal line
  const gy=y(COST);
  svg+=`<line x1="${pad.l}" y1="${gy}" x2="${svgW-pad.r}" y2="${gy}" class="chart-goal"/>`;
  svg+=`<text x="${svgW-pad.r}" y="${gy-6}" text-anchor="end" class="chart-goal-label">¥${COST} 目标</text>`;

  // Area + line
  if(dates.length===1){
    const cx=x(0),cy=y(visitData[0].cumNet);
    // Projection line
    const projSlope=visitData[0].cumNet;
    const visitsToGoal=Math.ceil(COST/projSlope);
    const projX=Math.min(pad.l+w,x(0)+w*0.6);
    const projY=y(Math.min(COST,maxY));
    svg+=`<line x1="${cx}" y1="${cy}" x2="${projX}" y2="${projY}" class="chart-proj"/>`;
    svg+=`<circle cx="${cx}" cy="${cy}" r="5" class="chart-dot"/>`;
  }else{
    let pts=visitData.map((v,i)=>`${x(i)},${y(v.cumNet)}`);
    let areaPath=`M${x(0)},${y(0)} L${pts.join(' L')} L${x(dates.length-1)},${y(0)}Z`;
    svg+=`<path d="${areaPath}" class="chart-area"/>`;
    svg+=`<polyline points="${pts.join(' ')}" class="chart-line">
      <animate attributeName="stroke-dashoffset" from="2000" to="0" dur="1.5s" fill="freeze"/>
    </polyline>`;
    visitData.forEach((v,i)=>{
      svg+=`<circle cx="${x(i)}" cy="${y(v.cumNet)}" r="4" class="chart-dot" style="animation:fadeUp .4s ${.3+i*.15}s both"/>`;
    });
  }

  // X labels
  visitData.forEach((v,i)=>{
    const dt=new Date(v.date+'T00:00:00');
    svg+=`<text x="${x(i)}" y="${svgH-4}" text-anchor="middle" class="chart-label">${dt.getMonth()+1}/${dt.getDate()}</text>`;
  });

  // Y labels
  const ySteps=[0,Math.round(maxY/3),Math.round(maxY*2/3),Math.round(maxY)];
  ySteps.forEach(v=>{
    svg+=`<text x="${pad.l-8}" y="${y(v)+3}" text-anchor="end" class="chart-label">¥${v}</text>`;
  });

  svg+=`</svg>`;
  return svg;
}

function render(records){
  const entrySaved=records.filter(r=>r.type==='🎢 入园').reduce((s,r)=>s+r.saved,0);
  const parkSpend=records.filter(r=>r.type!=='🎢 入园').reduce((s,r)=>s+r.paid,0);
  const net=entrySaved-parkSpend;
  const pct=Math.min(Math.max(net/COST*100,0),100);
  const done=net>=COST;
  const remaining=Math.max(COST-net,0);

  // Visit aggregation
  const visitMap={};
  records.forEach(r=>{if(!visitMap[r.date])visitMap[r.date]={date:r.date,saved:0,spent:0,items:[]};
    if(r.type==='🎢 入园')visitMap[r.date].saved+=r.saved;else visitMap[r.date].spent+=r.paid;
    visitMap[r.date].items.push(r)});
  const visits=Object.values(visitMap).sort((a,b)=>a.date.localeCompare(b.date));
  let cum=0;visits.forEach(v=>{cum+=v.saved-v.spent;v.cumNet=cum;v.net=v.saved-v.spent});
  const visitCount=visits.length;
  const avgNet=visitCount>0?net/visitCount:0;
  const needMore=avgNet>0?Math.ceil(remaining/avgNet):'∞';

  const app=document.getElementById('app');
  app.innerHTML=`
    <div class="hdr fi">
      <span class="logo">🎡</span>
      <h1>环球影城年卡回本追踪</h1>
      <div class="sub">${NAME} · ¥${COST}</div>
    </div>

    <div class="hero glass fi d1">
      <div class="hero-row">
        <div class="hero-left">
          <div class="label">${done?'🎉 已回本！':'回本进度'}</div>
          <div class="hero-pct ${done?'done':''}" id="pctEl">0.0%</div>
        </div>
        <div class="hero-right">
          <div class="net" style="color:${net>=0?'var(--g1)':'var(--r1)'}">¥${net}</div>
          <div class="netlbl">净回本</div>
        </div>
      </div>
      <div class="bar-outer">
        <div class="bar-inner ${done?'done':''}" style="width:0%" id="bar"></div>
      </div>
      <div class="kpis">
        <div class="kpi"><div class="kv" style="color:var(--g1)">¥${entrySaved}</div><div class="kl">门票节省</div></div>
        <div class="kpi"><div class="kv" style="color:var(--r1)">¥${parkSpend}</div><div class="kl">园内花费</div></div>
        <div class="kpi"><div class="kv">${done?'🎊':'¥'+remaining}</div><div class="kl">${done?'恭喜！':'还差'}</div></div>
      </div>
    </div>

    <div class="mcards">
      <div class="mc glass fi d2">
        <span class="mi">🎢</span>
        <div class="mn">${visitCount}</div>
        <div class="md">入园次数</div>
      </div>
      <div class="mc glass fi d2">
        <span class="mi">🎯</span>
        <div class="mn">${done?'✅':needMore}</div>
        <div class="md">${done?'已达成':'预计还需几次'}</div>
      </div>
    </div>

    <div class="chart-wrap glass fi d3">
      <div class="chart-title">📈 回本趋势</div>
      ${buildChart(visits,460,200)}
    </div>

    <div class="visits-wrap glass fi d4">
      <div class="chart-title">📊 每次入园收支</div>
      ${visits.map(v=>{
        const total=v.saved+v.spent||1;
        return`<div class="visit">
          <div class="visit-hdr">
            <span class="visit-date">${fmtDate(v.date)}</span>
            <span class="visit-net ${v.net>=0?'pos':'neg'}">${v.net>=0?'+':''}¥${v.net}</span>
          </div>
          <div class="visit-bars">
            <div class="vbar save" style="flex-grow:${v.saved/total}">+${v.saved}</div>
            ${v.spent>0?`<div class="vbar spend" style="flex-grow:${v.spent/total}">-${v.spent}</div>`:''}
          </div>
        </div>`}).join('')}
    </div>

    <div class="tl-wrap glass fi d5">
      <div class="chart-title">📋 消费明细</div>
      ${Object.entries(visitMap).sort((a,b)=>b[0].localeCompare(a[0])).map(([date,v])=>{
        const dayNet=v.saved-v.spent;
        return`<div class="tl-group">
          <div class="tl-date"><span class="tl-dot"></span>${fmtDate(date)}
            <span style="margin-left:auto;font-weight:700;color:${dayNet>=0?'var(--g1)':'var(--r1)'}">${dayNet>=0?'+':''}¥${dayNet}</span>
          </div>
          ${v.items.map(i=>{
            const isE=i.type==='🎢 入园';
            const disp=isE?'+¥'+i.saved:(i.paid>0?'-¥'+i.paid:'¥0');
            const cls=isE&&i.saved>0?'':(i.paid>0?'neg':'z');
            return`<div class="tl-item">
              <div class="tl-left"><span class="tl-ico">${ICONS[i.type]||'📌'}</span><span class="tl-nm">${i.name}</span></div>
              <span class="tl-sv ${cls}">${disp}</span>
            </div>`}).join('')}
        </div>`}).join('')}
    </div>

    <div class="ft fi d6">数据来自 Notion · ${new Date().toLocaleDateString('zh-CN')}</div>
  `;

  // Animate
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.getElementById('bar').style.width=pct+'%';
    countUp(document.getElementById('pctEl'),pct);
  }));
  if(done)setTimeout(confetti,1000);
}

const DATA=__DATA__;
render(DATA);
</script>
</body>
</html>
