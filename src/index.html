<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎡 环球影城年卡回本追踪</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0a0a0f;--card:#12121a;--border:rgba(255,255,255,0.06);
  --text:#e8e8ed;--dim:#6b6b7b;
  --accent:#6c5ce7;--accent2:#a29bfe;--accent-glow:rgba(108,92,231,0.3);
  --green:#00b894;--green2:#55efc4;--green-glow:rgba(0,184,148,0.3);
  --orange:#fdcb6e;--red:#e17055;
}

body{
  font-family:'Inter',-apple-system,system-ui,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

.glow{
  position:fixed;top:-200px;left:50%;transform:translateX(-50%);
  width:600px;height:600px;pointer-events:none;z-index:0;
  background:radial-gradient(circle,rgba(108,92,231,0.12) 0%,transparent 70%);
}

.wrap{max-width:520px;margin:0 auto;padding:40px 20px 60px;position:relative;z-index:1}

/* Header */
.hdr{text-align:center;margin-bottom:36px}
.hdr .icon{font-size:48px;display:block;margin-bottom:12px;filter:drop-shadow(0 0 20px rgba(108,92,231,0.4))}
.hdr h1{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.hdr .sub{font-size:13px;color:var(--dim)}

/* Hero card */
.hero{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:32px 28px;margin-bottom:16px;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.5;
}
.hero-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:20px}
.hero-label{font-size:13px;color:var(--dim);font-weight:500;text-transform:uppercase;letter-spacing:1px}
.hero-pct{
  font-size:42px;font-weight:900;letter-spacing:-2px;line-height:1;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hero-pct.done{background:linear-gradient(135deg,var(--green),var(--green2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* Progress */
.bar-track{width:100%;height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;margin-bottom:16px}
.bar-fill{
  height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width 1.5s cubic-bezier(.22,1,.36,1);position:relative;
}
.bar-fill.done{background:linear-gradient(90deg,var(--green),var(--green2))}
.bar-fill::after{
  content:'';position:absolute;right:0;top:-2px;width:12px;height:12px;border-radius:50%;
  background:#fff;box-shadow:0 0 12px var(--accent-glow);
}
.bar-fill.done::after{box-shadow:0 0 12px var(--green-glow)}

.stats{display:flex;justify-content:space-between}
.stat{text-align:center}
.stat .v{font-size:18px;font-weight:700;margin-bottom:2px}
.stat .l{font-size:11px;color:var(--dim);font-weight:500}
.v.g{color:var(--green)}.v.o{color:var(--orange)}.v.r{color:var(--red)}

/* Mini cards */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 16px;text-align:center}
.mc .mi{font-size:24px;display:block;margin-bottom:8px}
.mc .mn{font-size:24px;font-weight:800;letter-spacing:-1px;margin-bottom:2px}
.mc .md{font-size:11px;color:var(--dim);font-weight:500}

/* Timeline */
.stitle{font-size:14px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin:28px 0 14px}
.tl{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.tg{padding:16px 20px 12px;border-bottom:1px solid var(--border)}
.tg:last-child{border-bottom:none}
.td{font-size:12px;font-weight:600;color:var(--dim);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.td .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.ti{display:flex;justify-content:space-between;align-items:center;padding:6px 0 6px 14px}
.ti .left{display:flex;align-items:center;gap:10px}
.ti .ico{font-size:16px;width:28px;text-align:center}
.ti .nm{font-size:14px;font-weight:500}
.ti .sv{font-size:14px;font-weight:700;color:var(--green)}
.ti .sv.z{color:var(--dim);font-weight:400}
.ti .sv.neg{color:var(--red);font-weight:600}

/* Refresh */
.refresh-row{display:flex;justify-content:center;margin-top:24px}
.refresh-btn{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:10px 20px;color:var(--dim);font-size:12px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:all .2s;
}
.refresh-btn:hover{border-color:var(--accent);color:var(--text)}
.refresh-btn.spinning .ri{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
.ft{text-align:center;margin-top:16px;font-size:11px;color:var(--dim);opacity:.5}

/* Loading */
.loading{text-align:center;padding:80px 0;color:var(--dim)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}

/* Error */
.err{text-align:center;padding:60px 20px;color:var(--red)}
.err .ei{font-size:40px;margin-bottom:12px;display:block}
.err .em{font-size:14px;margin-bottom:16px}

/* Animate */
.fi{animation:fadeUp .6s cubic-bezier(.22,1,.36,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.d1{animation-delay:.1s}.d2{animation-delay:.2s}.d3{animation-delay:.3s}.d4{animation-delay:.4s}

/* Confetti */
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;overflow:hidden}
.confetti{position:absolute;width:8px;height:8px;border-radius:2px;top:-10px;animation:confettiFall 3s ease-in forwards}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}
</style>
</head>
<body>

<div class="glow"></div>
<div class="wrap" id="app">
  <div class="loading"><div class="spinner"></div><div>加载中…</div></div>
</div>

<script>
const CARD_COST = 1688;
const CARD_NAME = '悠享年卡';

const ICONS = {
  '🎢 入园':'🎢','🍔 餐饮':'🍔','🎁 商品折扣':'🎁',
  '🅿️ 停车':'🅿️','🎪 活动/福利':'🎪','🏨 酒店折扣':'🏨'
};

function formatDate(d){
  const dt=new Date(d+'T00:00:00');
  const wd=['日','一','二','三','四','五','六'];
  return `${dt.getMonth()+1}月${dt.getDate()}日 周${wd[dt.getDay()]}`;
}

function showConfetti(){
  const c=document.createElement('div');
  c.className='confetti-container';
  const colors=['#6c5ce7','#a29bfe','#00b894','#55efc4','#fdcb6e','#e17055','#fd79a8','#74b9ff'];
  for(let i=0;i<60;i++){
    const p=document.createElement('div');
    p.className='confetti';
    p.style.left=Math.random()*100+'%';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay=Math.random()*2+'s';
    p.style.animationDuration=(2+Math.random()*2)+'s';
    p.style.width=(4+Math.random()*8)+'px';
    p.style.height=(4+Math.random()*8)+'px';
    c.appendChild(p);
  }
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),5000);
}

function render(records){
  // Calculate: entry savings minus all in-park spending
  const entrySaved = records.filter(r=>r.type==='🎢 入园').reduce((s,r)=>s+r.saved,0);
  const parkSpending = records.filter(r=>r.type!=='🎢 入园').reduce((s,r)=>s+r.paid,0);
  const netSaved = entrySaved - parkSpending;
  const pct = Math.min(Math.max((netSaved/CARD_COST)*100,0),100);
  const done = netSaved >= CARD_COST;
  const remaining = Math.max(CARD_COST - netSaved, 0);

  const visitDates = new Set(records.filter(r=>r.type==='🎢 入园').map(r=>r.date));
  const visits = visitDates.size;
  const avgNet = visits > 0 ? netSaved / visits : 0;
  const visitsLeft = avgNet > 0 ? Math.ceil(remaining / avgNet) : '∞';

  // Group by date
  const groups = {};
  records.sort((a,b)=>b.date.localeCompare(a.date));
  for(const r of records){
    if(!groups[r.date]) groups[r.date]=[];
    groups[r.date].push(r);
  }

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="hdr fi">
      <span class="icon">🎡</span>
      <h1>环球影城年卡回本追踪</h1>
      <div class="sub">${CARD_NAME} · ¥${CARD_COST}</div>
    </div>

    <div class="hero fi d1">
      <div class="hero-top">
        <span class="hero-label">${done?'🎉 已回本！':'回本进度'}</span>
        <span class="hero-pct ${done?'done':''}">${pct.toFixed(1)}%</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill ${done?'done':''}" style="width:0%" id="prog"></div>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="v g">¥${entrySaved}</div>
          <div class="l">门票节省</div>
        </div>
        <div class="stat">
          <div class="v r">¥${parkSpending}</div>
          <div class="l">园内花费</div>
        </div>
        <div class="stat">
          <div class="v" style="color:${done?'var(--green)':'var(--text)'}">
            ${done?'🎊':'¥'+netSaved}
          </div>
          <div class="l">${done?'恭喜！':'净回本'}</div>
        </div>
      </div>
    </div>

    <div class="cards fi d2">
      <div class="mc">
        <span class="mi">🎢</span>
        <div class="mn">${visits}</div>
        <div class="md">入园次数</div>
      </div>
      <div class="mc">
        <span class="mi">🎯</span>
        <div class="mn">${done?'✅':visitsLeft}</div>
        <div class="md">${done?'已达成':'预计还需几次'}</div>
      </div>
    </div>

    <div class="stitle fi d3">消费记录</div>
    <div class="tl fi d4">
      ${Object.entries(groups).map(([date,items])=>{
        const daySaved = items.filter(i=>i.type==='🎢 入园').reduce((s,i)=>s+i.saved,0);
        const daySpent = items.filter(i=>i.type!=='🎢 入园').reduce((s,i)=>s+i.paid,0);
        const dayNet = daySaved - daySpent;
        return `
        <div class="tg">
          <div class="td">
            <span class="dot"></span>
            ${formatDate(date)}
            <span style="margin-left:auto;font-weight:700;color:${dayNet>=0?'var(--green)':'var(--red)'}">
              ${dayNet>=0?'+':''}\u00A5${dayNet}
            </span>
          </div>
          ${items.map(i=>{
            const isEntry = i.type==='🎢 入园';
            const display = isEntry ? '+¥'+i.saved : (i.paid>0 ? '-¥'+i.paid : '¥0');
            const cls = isEntry && i.saved>0 ? '' : (i.paid>0 ? 'neg' : 'z');
            return `
            <div class="ti">
              <div class="left">
                <span class="ico">${ICONS[i.type]||'📌'}</span>
                <span class="nm">${i.name}</span>
              </div>
              <span class="sv ${cls}">${display}</span>
            </div>`;
          }).join('')}
        </div>`;
      }).join('')}
    </div>

    <div class="refresh-row fi d4">
      <button class="refresh-btn" onclick="loadData()">
        <span class="ri">↻</span> 刷新数据
      </button>
    </div>

    <div class="ft fi d4">
      数据来自 Notion · ${new Date().toLocaleDateString('zh-CN')} ${new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}
    </div>
  `;

  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      const p=document.getElementById('prog');
      if(p) p.style.width=pct+'%';
    });
  });

  if(done) setTimeout(showConfetti, 800);
}

function showError(msg){
  document.getElementById('app').innerHTML=`
    <div class="hdr fi"><span class="icon">🎡</span><h1>环球影城年卡回本追踪</h1></div>
    <div class="err fi d1">
      <span class="ei">😵</span>
      <div class="em">${msg}</div>
      <button class="refresh-btn" onclick="loadData()" style="margin:0 auto">
        <span class="ri">↻</span> 重试
      </button>
    </div>`;
}

async function loadData(){
  const btn=document.querySelector('.refresh-btn');
  if(btn) btn.classList.add('spinning');
  try{
    const res=await fetch('/api/data');
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    if(data.error) throw new Error(data.error);
    render(data);
  }catch(e){
    showError('数据加载失败：'+e.message);
  }
}

loadData();
</script>
</body>
</html>
